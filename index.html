<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Forge Lite</title>
    <style>
        body { background-color: #0f0f0f; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding-top: 50px; }
        .container { width: 100%; max-width: 500px; padding: 20px; border: 1px solid #333; background: #1a1a1a; border-radius: 8px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff41; color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #00cc33; }
        .result { margin-top: 20px; padding: 10px; border: 1px dashed #555; word-break: break-all; display: none; }
        label { display: block; margin-bottom: 5px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-top: 0;">META FORGE LITE</h2>

    <label>TARGET URL (Tujuan Redirect)</label>
    <input type="text" id="url" placeholder="https://..." value="https://flowork.cloud">

    <label>JUDUL (Muncul di WA)</label>
    <input type="text" id="title" placeholder="Judul Heboh...">

    <label>DESKRIPSI</label>
    <textarea id="desc" rows="3" placeholder="Keterangan singkat..."></textarea>

    <label>GAMBAR URL (Wajib HTTPS & Ringan)</label>
    <input type="text" id="image" placeholder="https://.../gambar.jpg">

    <button onclick="generate()">🔨 TEMPA LINK</button>

    <div class="result" id="resultBox">
        <p style="margin:0 0 5px 0; color:#fff;">Copy Link Ini:</p>
        <textarea id="output" readonly rows="4" style="color: #00ff41; border-color: #00ff41;"></textarea>
    </div>
</div>

<script>
    function generate() {
        const u = document.getElementById('url').value;
        const t = document.getElementById('title').value;
        const d = document.getElementById('desc').value;
        const i = document.getElementById('image').value;

        if(!u) return alert("Target URL wajib diisi!");

        // Buat Object Data
        const data = { u, t, d, i };

        // Encode ke Base64 (Support Emoji/UTF-8)
        const json = JSON.stringify(data);
        const base64 = btoa(unescape(encodeURIComponent(json)));

        // URL Final (Perhatikan folder '/s/')
        const finalUrl = window.location.origin + "/s/" + base64;

        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('output').value = finalUrl;
    }
</script>

</body>
</html>
