<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASSET GUARD | GESTURE</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="../../assets/js/auto-tracker.js"></script>

    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --bg-core: #0f1016;
            --bg-panel: #171925;
            --bg-input: #1f2233;

            --border-dim: rgba(84, 215, 246, 0.15);
            --border-bright: #54d7f6;

            --primary: #54d7f6;   /* Cyan */
            --secondary: #706bf3; /* Purple */
            --accent: #ff3e3e;    /* Red */

            --txt-main: #e0f0ff;
            --txt-muted: #94a3b8;
            --txt-inv: #0f1016;
        }

        [data-theme="light"] {
            --bg-core: #f0f2f5;
            --bg-panel: #ffffff;
            --bg-input: #e2e8f0;
            --border-dim: #cbd5e1;
            --primary: #0077b6;
            --secondary: #4361ee;
            --accent: #d90429;
            --txt-main: #102a43;
            --txt-muted: #627d98;
            --txt-inv: #ffffff;
        }

        [data-theme="hacker"] {
            --bg-core: #000000;
            --bg-panel: #050505;
            --bg-input: #0a0a0a;
            --border-dim: #004400;
            --primary: #00ff00;
            --secondary: #008f11;
            --accent: #ff0000;
            --txt-main: #00ff00;
            --txt-muted: #005500;
            --txt-inv: #000000;
        }

        /* --- BASE STYLES --- */
        body {
            background-color: var(--bg-core);
            color: var(--txt-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* KUNCI SCROLL WINDOW UTAMA */
            touch-action: none; /* Mencegah pull-to-refresh */
        }
        .font-hud { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'Share Tech Mono', monospace; }

        /* Custom Scrollbar */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Range Slider */
        input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            height: 20px; width: 20px; border-radius: 50%;
            background: var(--primary); margin-top: -8px; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid var(--bg-panel);
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: var(--bg-input); border-radius: 2px;
        }

        /* Radio Logic */
        input[type="radio"]:checked + div {
            background-color: var(--primary);
            color: var(--txt-inv);
            box-shadow: 0 0 15px rgba(84, 215, 246, 0.3);
        }

        /* LAYOUT LOGIC */
        /* Canvas area must allow touch but prevent default browser zoom */
        canvas { touch-action: none; }
    </style>
</head>

<body class="flex flex-col h-screen w-full bg-[var(--bg-core)] text-[var(--txt-main)]">

    <nav class="h-14 shrink-0 z-50 flex items-center justify-between px-4 border-b bg-[var(--bg-panel)] border-[var(--border-dim)]">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center font-black shadow-lg text-[var(--txt-inv)] bg-gradient-to-br from-[var(--secondary)] to-[var(--primary)]">
                AG
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-widest leading-none font-hud">ASSET<span style="color: var(--primary);">GUARD</span></h1>
                <p class="text-[8px] font-bold tracking-[0.2em] opacity-60 mt-0.5">V14 GESTURE</p>
            </div>
        </div>
        <button onclick="window.appCore.toggleTheme()" class="p-2 rounded-full border opacity-70 hover:opacity-100 border-[var(--border-dim)] text-[var(--txt-main)] active:scale-95 transition">
            <i data-lucide="sun-moon" class="w-5 h-5"></i>
        </button>
    </nav>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden relative w-full h-full">

        <div class="shrink-0 h-[45%] lg:h-full lg:flex-1 relative flex flex-col bg-[var(--bg-input)] border-b lg:border-b-0 lg:border-r border-[var(--border-dim)] z-30">

            <div class="w-full h-full relative flex items-center justify-center overflow-hidden bg-black/20">
                <div class="absolute inset-0 opacity-10 pointer-events-none"
                     style="background-image: linear-gradient(0deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent); background-size: 40px 40px;">
                </div>

                <canvas id="preview-canvas" class="max-w-full max-h-full shadow-2xl cursor-move touch-none"></canvas>

                <div id="gesture-hint" class="absolute bottom-4 px-3 py-1 rounded-full bg-black/60 border border-[var(--primary)] text-[var(--primary)] text-[9px] font-bold backdrop-blur-md pointer-events-none flex items-center gap-2 opacity-80">
                    <i data-lucide="move" class="w-3 h-3"></i> DRAG | <i data-lucide="minimize" class="w-3 h-3"></i> PINCH
                </div>
            </div>
        </div>

        <div class="flex-1 lg:w-[420px] flex flex-col bg-[var(--bg-panel)] z-20 h-full overflow-hidden">

            <div class="flex-1 overflow-y-auto hide-scroll p-5 space-y-6 pb-[150px] lg:pb-10">

                <div class="p-1 rounded-xl border bg-[var(--bg-input)] border-[var(--border-dim)]">
                    <div class="relative group h-20 rounded-lg border-2 border-dashed flex flex-col items-center justify-center cursor-pointer hover:bg-[var(--bg-panel)] transition-all border-[var(--txt-muted)] hover:border-[var(--primary)]">
                        <input type="file" id="target-input" accept="image/*" multiple class="absolute inset-0 opacity-0 z-10 w-full h-full cursor-pointer">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-[var(--bg-panel)] flex items-center justify-center shadow-inner">
                                <i data-lucide="layers" class="w-4 h-4 text-[var(--primary)]"></i>
                            </div>
                            <div class="text-left">
                                <div class="font-bold text-[10px] text-[var(--txt-main)]" id="target-count">UPLOAD FOTO</div>
                                <div class="text-[8px] text-[var(--txt-muted)]">SUPPORT MULTI FILES</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-bold tracking-widest opacity-70 mb-2 block pl-1">SUMBER WATERMARK</label>
                    <div class="flex p-1 rounded-lg bg-[var(--bg-input)] border border-[var(--border-dim)]">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="wm-mode" value="text" checked class="hidden">
                            <div class="py-2.5 text-[9px] font-bold text-center rounded transition-all text-[var(--txt-muted)]">TEKS</div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="wm-mode" value="image" class="hidden">
                            <div class="py-2.5 text-[9px] font-bold text-center rounded transition-all text-[var(--txt-muted)]">LOGO</div>
                        </label>
                    </div>

                    <div id="panel-text" class="mt-3 space-y-2 animate-fade-in">
                        <div class="flex gap-2">
                            <input id="wm-text-input" type="text" value="COPYRIGHT 2026"
                                   class="flex-1 px-3 py-2.5 rounded-lg text-xs font-bold border outline-none transition-all
                                          bg-[var(--bg-input)] text-[var(--txt-main)] border-[var(--border-dim)]
                                          focus:border-[var(--primary)]">
                            <input type="color" id="wm-color-input" class="w-10 h-full rounded-lg border-0 p-0 cursor-pointer shadow-sm" value="#ffffff">
                        </div>
                    </div>

                    <div id="panel-image" class="hidden mt-3 animate-fade-in">
                        <div class="relative w-full h-12 rounded-lg flex items-center justify-center border border-dashed cursor-pointer bg-[var(--bg-input)] border-[var(--border-dim)]">
                            <input type="file" id="wm-image-input" class="absolute inset-0 opacity-0 w-full h-full cursor-pointer">
                            <span class="text-[9px] font-bold flex items-center gap-2 text-[var(--txt-muted)]">
                                <i data-lucide="image-plus" class="w-3 h-3"></i> PILIH LOGO PNG
                            </span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 pt-2 border-t border-[var(--border-dim)]">
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[9px] font-bold flex items-center gap-1 opacity-80"><i data-lucide="maximize" class="w-3 h-3"></i> UKURAN (PINCH)</span>
                            <span id="val-scale" class="text-[9px] font-mono font-bold text-[var(--primary)]">20%</span>
                        </div>
                        <input type="range" id="opt-scale" min="5" max="100" value="20" class="w-full">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[9px] font-bold flex items-center gap-1 opacity-80"><i data-lucide="droplet" class="w-3 h-3"></i> TRANSPARAN</span>
                            <span id="val-opacity" class="text-[9px] font-mono font-bold text-[var(--secondary)]">50%</span>
                        </div>
                        <input type="range" id="opt-opacity" min="0" max="100" value="50" class="w-full">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[9px] font-bold flex items-center gap-1 opacity-80"><i data-lucide="refresh-cw" class="w-3 h-3"></i> ROTASI</span>
                            <span id="val-rotation" class="text-[9px] font-mono font-bold text-[var(--accent)]">0°</span>
                        </div>
                        <input type="range" id="opt-rotation" min="-180" max="180" value="0" class="w-full">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="window.appCore.setPresetPos('tl')" class="h-10 rounded border bg-[var(--bg-input)] hover:bg-[var(--primary)] hover:text-black transition border-[var(--border-dim)] text-[var(--txt-muted)]"><i data-lucide="arrow-up-left" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="window.appCore.setPresetPos('c')" class="h-10 rounded border bg-[var(--bg-input)] hover:bg-[var(--primary)] hover:text-black transition border-[var(--border-dim)] text-[var(--txt-muted)] text-[9px] font-bold">PUSAT</button>
                    <button onclick="window.appCore.setPresetPos('tr')" class="h-10 rounded border bg-[var(--bg-input)] hover:bg-[var(--primary)] hover:text-black transition border-[var(--border-dim)] text-[var(--txt-muted)]"><i data-lucide="arrow-up-right" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="window.appCore.setPresetPos('tile')" class="col-span-3 h-10 rounded border hover:opacity-80 active:scale-95 transition text-[9px] font-bold flex items-center justify-center gap-2 border-[var(--primary)] text-[var(--primary)] bg-[var(--bg-input)]">
                        <i data-lucide="grid-3x3" class="w-3 h-3"></i> MODE UBIN (TILE)
                    </button>
                </div>

                <button onclick="window.appCore.processBatch()" id="btn-process"
                        class="w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all"
                        style="background: var(--primary); color: var(--txt-inv);">
                    <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
                    <span>PROSES SEMUA</span>
                </button>

                <div class="h-20 w-full block"></div>

            </div>
        </div>
    </main>

    <script>
        const AppCore = {
            targetImages: [],
            watermarkSource: null,
            watermarkType: 'text',
            config: { opacity: 0.5, scale: 20, posX: 0.5, posY: 0.5, text: 'COPYRIGHT 2026', color: '#ffffff', rotation: 0, isTiled: false },

            // TOUCH LOGIC VARIABLES
            dragState: { active: false, startX: 0, startY: 0, startPosX: 0, startPosY: 0 },
            pinchState: { active: false, startDist: 0, startScale: 0 },

            init() {
                lucide.createIcons();
                this.initTheme();
                this.initLogic();
            },

            // --- THEME ---
            toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme') || 'dark';
                const next = current === 'dark' ? 'light' : 'dark';
                this.applyTheme(next);
            },
            applyTheme(theme) {
                if(!theme) return;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('flowork-theme', theme);
            },
            initTheme() {
                const savedTheme = localStorage.getItem('flowork-theme');
                if(savedTheme) this.applyTheme(savedTheme);
                if(window.parent) window.parent.postMessage({ type: 'iframe-ready' }, '*');
            },

            // --- LOGIC ---
            initLogic() {
                document.getElementById('target-input').addEventListener('change', (e) => this.handleTargetFiles(e.target.files));
                document.getElementById('wm-image-input').addEventListener('change', (e) => this.handleWatermarkFile(e.target.files[0]));

                this.bindControl('opt-opacity', 'input', (v) => this.config.opacity = v / 100, '%');
                this.bindControl('opt-scale', 'input', (v) => this.config.scale = v, '%');
                this.bindControl('opt-rotation', 'input', (v) => this.config.rotation = v, '°');
                this.bindControl('wm-text-input', 'input', (v) => { this.config.text = v; this.updatePreview(); });
                this.bindControl('wm-color-input', 'input', (v) => { this.config.color = v; this.updatePreview(); });

                document.querySelectorAll('input[name="wm-mode"]').forEach(r => {
                    r.addEventListener('change', (e) => {
                        this.watermarkType = e.target.value;
                        const isText = this.watermarkType === 'text';
                        document.getElementById('panel-text').classList.toggle('hidden', !isText);
                        document.getElementById('panel-image').classList.toggle('hidden', isText);
                        this.updatePreview();
                    });
                });

                // --- GESTURE CONTROL (TOUCH & MOUSE) ---
                const canvas = document.getElementById('preview-canvas');

                // MOUSE (Desktop)
                canvas.addEventListener('mousedown', (e) => this.startDrag(e.clientX, e.clientY));
                window.addEventListener('mousemove', (e) => this.onDrag(e.clientX, e.clientY));
                window.addEventListener('mouseup', () => this.endDrag());

                // TOUCH (Mobile Multitouch)
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // Prevent scroll page when touching canvas
                    if (e.touches.length === 1) {
                        // Single touch = Drag
                        this.startDrag(e.touches[0].clientX, e.touches[0].clientY);
                    } else if (e.touches.length === 2) {
                        // Double touch = Pinch (Zoom)
                        this.startPinch(e.touches[0], e.touches[1]);
                    }
                }, { passive: false });

                window.addEventListener('touchmove', (e) => {
                    if (this.dragState.active && e.touches.length === 1) {
                        e.preventDefault();
                        this.onDrag(e.touches[0].clientX, e.touches[0].clientY);
                    } else if (this.pinchState.active && e.touches.length === 2) {
                        e.preventDefault();
                        this.onPinch(e.touches[0], e.touches[1]);
                    }
                }, { passive: false });

                window.addEventListener('touchend', () => {
                    this.endDrag();
                    this.endPinch();
                });
            },

            // --- GESTURE HANDLERS ---
            startDrag(x, y) {
                if (this.config.isTiled) return;
                this.dragState = { active: true, startX: x, startY: y, startPosX: this.config.posX, startPosY: this.config.posY };
            },
            onDrag(x, y) {
                if (!this.dragState.active) return;
                const rect = document.getElementById('preview-canvas').getBoundingClientRect();
                this.config.posX = this.dragState.startPosX + ((x - this.dragState.startX) / rect.width);
                this.config.posY = this.dragState.startPosY + ((y - this.dragState.startY) / rect.height);
                this.updatePreview();
            },
            endDrag() { this.dragState.active = false; },

            startPinch(t1, t2) {
                if (this.config.isTiled) return;
                const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                this.pinchState = { active: true, startDist: dist, startScale: parseFloat(this.config.scale) };
            },
            onPinch(t1, t2) {
                if (!this.pinchState.active) return;
                const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                // Calculate new scale based on distance ratio
                let newScale = this.pinchState.startScale * (dist / this.pinchState.startDist);
                // Clamp scale 5% to 100%
                newScale = Math.max(5, Math.min(100, newScale));

                this.config.scale = newScale;

                // Update UI Slider
                document.getElementById('opt-scale').value = newScale;
                document.getElementById('val-scale').innerText = Math.round(newScale) + '%';
                this.updatePreview();
            },
            endPinch() { this.pinchState.active = false; },

            // --- CORE FUNCTIONS ---
            bindControl(id, ev, cb, suffix='') {
                const el = document.getElementById(id);
                el.addEventListener(ev, (e) => {
                    cb(e.target.value);
                    document.getElementById('val-'+id.replace('opt-','')).innerText = Math.round(e.target.value) + suffix;
                    this.updatePreview();
                });
            },

            handleTargetFiles(files) {
                if(!files.length) return;
                this.targetImages = Array.from(files);
                document.getElementById('target-count').innerText = `${files.length} FOTO SIAP`;
                document.getElementById('target-count').style.color = 'var(--primary)';
                this.updatePreview();
            },

            handleWatermarkFile(file) {
                if(!file) return;
                const r = new FileReader();
                r.onload = (e) => {
                    const img = new Image();
                    img.onload = () => { this.watermarkSource = img; this.updatePreview(); };
                    img.src = e.target.result;
                };
                r.readAsDataURL(file);
            },

            loadImage(f) {
                return new Promise(r => { const rd=new FileReader(); rd.onload=e=>{ const i=new Image(); i.onload=()=>r(i); i.src=e.target.result; }; rd.readAsDataURL(f); });
            },

            async updatePreview() {
                if(!this.targetImages.length) return;
                const cvs = document.getElementById('preview-canvas');
                const ctx = cvs.getContext('2d');
                const img = await this.loadImage(this.targetImages[0]);

                // Responsive Preview Scale
                // Desktop: Max 800px width. Mobile: Max 400px width (for performance).
                const maxDim = window.innerWidth < 768 ? 600 : 1000;
                const scale = Math.min(1, maxDim/img.width, maxDim/img.height);

                cvs.width = img.width * scale;
                cvs.height = img.height * scale;

                ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
                await this.drawWatermark(ctx, cvs.width, cvs.height);
            },

            async drawWatermark(ctx, w, h) {
                ctx.globalAlpha = this.config.opacity;
                ctx.save();
                let wmObj, wmW, wmH;

                if(this.watermarkType==='image' && this.watermarkSource) {
                    wmObj = this.watermarkSource;
                    const r = wmObj.width/wmObj.height;
                    wmW = (w*this.config.scale)/100;
                    wmH = wmW/r;
                } else {
                    const fs = (w*this.config.scale)/100;
                    ctx.font = `bold ${fs}px Inter, sans-serif`;
                    ctx.fillStyle = this.config.color;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    const m = ctx.measureText(this.config.text);
                    wmW = m.width; wmH = fs;
                    wmObj = {type:'text', text:this.config.text};
                }

                if(this.config.isTiled) {
                    ctx.translate(w/2, h/2); ctx.rotate((this.config.rotation*Math.PI)/180); ctx.translate(-w/2, -h/2);
                    const cols=3, rows=3, sX=w/cols, sY=h/rows;
                    for(let i=0; i<cols; i++) for(let j=0; j<rows; j++) this.renderObj(ctx, wmObj, (i*sX)+(sX/2), (j*sY)+(sY/2), wmW, wmH);
                } else {
                    const x=w*this.config.posX, y=h*this.config.posY;
                    ctx.translate(x,y); ctx.rotate((this.config.rotation*Math.PI)/180);
                    this.renderObj(ctx, wmObj, 0, 0, wmW, wmH);
                }
                ctx.restore();
                ctx.globalAlpha = 1.0;
            },

            renderObj(ctx, obj, x, y, w, h) {
                if(obj.type==='text') ctx.fillText(obj.text, x, y);
                else ctx.drawImage(obj, x-w/2, y-h/2, w, h);
            },

            setPresetPos(pos) {
                this.config.isTiled = (pos==='tile');
                if(!this.config.isTiled) {
                    if(pos==='tl'){this.config.posX=0.1;this.config.posY=0.1;}
                    if(pos==='c'){this.config.posX=0.5;this.config.posY=0.5;}
                    if(pos==='tr'){this.config.posX=0.9;this.config.posY=0.1;}
                }
                this.updatePreview();
            },

            async processBatch() {
                if(!this.targetImages.length) return alert("Upload foto dulu!");
                const btn = document.getElementById('btn-process');
                const origText = btn.innerHTML;
                btn.disabled = true;

                const zip = new JSZip();
                for(let i=0; i<this.targetImages.length; i++) {
                    btn.innerHTML = `<span class="animate-pulse">PROSES ${Math.round(((i+1)/this.targetImages.length)*100)}%</span>`;
                    const f = this.targetImages[i];
                    const cvs = document.createElement('canvas');
                    const ctx = cvs.getContext('2d');
                    const img = await this.loadImage(f);
                    cvs.width = img.width; cvs.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    await this.drawWatermark(ctx, cvs.width, cvs.height);
                    const blob = await new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.9));
                    zip.file("WM_" + f.name, blob);
                }

                btn.innerHTML = "ZIP...";
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, "AssetGuard_Result.zip");
                btn.innerHTML = origText;
                btn.disabled = false;
            }
        };

        window.appCore = AppCore;
        window.onload = () => AppCore.init();
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data && (data.type === 'THEME_UPDATE' || data.type === 'setTheme')) {
                AppCore.applyTheme(data.theme);
            }
        });
    </script>
</body>
</html>
