<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pass Forge | High Entropy Generator</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.0.0/dist/vuetify.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.0.0/dist/vuetify.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@5.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/js/auto-tracker.js"></script>
    <style>
        :root {
            /* FLOWORK PALETTE */
            --bg-core: #171925;
            --neon-cyan: #54d7f6;
            --neon-purple: #706bf3;
            --input-bg: #3a3962;
            --pass-red: #ff003c;
            --pass-yellow: #facc15;
            --pass-green: #0aff60;
        }

        body {
            background-color: var(--bg-core);
            color: #e0f0ff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden; /* App mode */
            height: 100dvh; /* Mobile Friendly Height */
            font-size: 16px; /* Prevent iOS zoom */
        }

        /* GRID BACKGROUND */
        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image:
                linear-gradient(rgba(23, 25, 37, 0.95), rgba(23, 25, 37, 0.95)),
                linear-gradient(0deg, transparent 24%, rgba(84, 215, 246, 0.03) 25%, rgba(84, 215, 246, 0.03) 26%, transparent 27%, transparent 74%, rgba(84, 215, 246, 0.03) 75%, rgba(84, 215, 246, 0.03) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(84, 215, 246, 0.03) 25%, rgba(84, 215, 246, 0.03) 26%, transparent 27%, transparent 74%, rgba(84, 215, 246, 0.03) 75%, rgba(84, 215, 246, 0.03) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }

        /* UTILS */
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .hidden-view { display: none !important; }

        /* SCROLLBAR */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--pass-red); border-radius: 3px; }

        /* Mobile Safe Area */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>

    <main class="w-full h-full relative flex flex-col">
        <div id="view-app" class="w-full h-full"></div>
    </main>

    <script>
        const AppCore = {
            userIdentity: null,
            vueInstance: null,

            async init() {
                // Lander loadPartial removed
                await this.loadPartial('view-app', 'partials/app.html');

                // 2. Init Vue Logic
                this.initVue();

                // 3. Listen to Parent (Flowork OS)
                window.addEventListener('message', (e) => {
                    if (e.data?.type === 'FLOWORK_IDENTITY_SYNC') {
                        this.setIdentity(e.data.userAddress);
                    }
                });

                console.log("SYSTEM: PASS FORGE READY");
            },

            async loadPartial(id, url) {
                const res = await fetch(url);
                document.getElementById(id).innerHTML = await res.text();
            },

            // switchTab function removed

            setIdentity(address) {
                this.userIdentity = address;
                const tutorial = document.getElementById('api-tutorial');
                if(tutorial) address ? tutorial.style.display = 'block' : tutorial.style.display = 'none';
            },

            openSettings() {
                window.parent.postMessage({ type: 'OPEN_SETTINGS', tab: 'variables' }, '*');
            },

            initVue() {
                const { createApp, ref, computed, onMounted } = Vue;
                const { createVuetify } = Vuetify;
                const vuetify = createVuetify({ theme: { defaultTheme: 'dark' } });

                const app = createApp({
                    setup() {
                        const length = ref(16);
                        const useUpper = ref(true);
                        const useLower = ref(true);
                        const useNumbers = ref(true);
                        const useSymbols = ref(true);
                        const generatedPass = ref('');

                        const generate = () => {
                            const u = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                            const l = "abcdefghijklmnopqrstuvwxyz";
                            const n = "0123456789";
                            const s = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
                            let chars = "";
                            if(useUpper.value) chars += u;
                            if(useLower.value) chars += l;
                            if(useNumbers.value) chars += n;
                            if(useSymbols.value) chars += s;

                            if(chars === "") return generatedPass.value = "SELECT OPTION";

                            let res = "";
                            // CSPRNG (Cryptographically Secure)
                            const array = new Uint32Array(length.value);
                            window.crypto.getRandomValues(array);

                            for(let i=0; i<length.value; i++) {
                                res += chars[array[i] % chars.length];
                            }
                            generatedPass.value = res;
                        };

                        const strength = computed(() => {
                            let score = 0;
                            if(length.value > 8) score += 20;
                            if(length.value > 12) score += 20;
                            if(length.value > 16) score += 20;
                            if(useUpper.value && useLower.value) score += 20;
                            if(useNumbers.value && useSymbols.value) score += 20;
                            if(score > 100) score = 100;

                            let color = '#ff003c'; // red
                            let label = 'WEAK';
                            if(score > 60) { color = '#facc15'; label = 'MODERATE'; }
                            if(score > 80) { color = '#0aff60'; label = 'GODLIKE'; }

                            return { score, color, label };
                        });

                        const copyPass = () => {
                            navigator.clipboard.writeText(generatedPass.value);
                        };

                        onMounted(() => {
                            generate();
                        });

                        return {
                            length, useUpper, useLower, useNumbers, useSymbols,
                            generatedPass, generate, strength, copyPass
                        };
                    }
                });

                app.use(vuetify).mount('#vue-root');
            }
        };

        window.appCore = AppCore;
        window.onload = () => AppCore.init();
    </script>
</body>
</html>
