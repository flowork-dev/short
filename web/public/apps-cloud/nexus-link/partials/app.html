<div class="flex flex-col md:flex-row h-full w-full bg-[#09090b]" id="editor-container">

    <div class="md:hidden h-14 bg-[#0c0c0e]/95 backdrop-blur border-b border-white/5 shrink-0 flex items-center justify-between px-4 sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
             <div class="w-6 h-6 rounded bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i data-lucide="layout" class="text-white w-3 h-3"></i>
            </div>
            <span class="font-display font-bold text-sm tracking-tight text-white">Nexus</span>
        </div>

        <div class="flex bg-black/50 p-1 rounded-lg border border-white/5">
            <button onclick="window.toggleMobileView('edit')" id="tab-edit" class="px-4 py-1.5 rounded-md text-[10px] font-bold transition bg-indigo-600 text-white shadow tracking-wide">
                EDITOR
            </button>
            <button onclick="window.toggleMobileView('preview')" id="tab-preview" class="px-4 py-1.5 rounded-md text-[10px] font-bold transition text-zinc-500 hover:text-white tracking-wide">
                PREVIEW
            </button>
        </div>

        <button onclick="window.appCore.switchTab('lander')" class="text-zinc-400 p-2 active:scale-90 transition">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>

    <div id="panel-editor" class="w-full md:w-[480px] flex flex-col md:border-r border-white/5 bg-[#0c0c0e] relative z-20 shadow-2xl h-full">

        <div class="hidden md:flex h-16 border-b border-white/5 items-center justify-between px-6 bg-[#0c0c0e]/80 backdrop-blur shrink-0 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="layout" class="text-white w-4 h-4"></i>
                </div>
                <span class="font-display font-bold text-lg tracking-tight text-white">Nexus<span class="text-indigo-500">Editor</span></span>
            </div>
            <button onclick="window.appCore.switchTab('lander')" class="p-2 hover:bg-white/5 rounded-full text-zinc-400 hover:text-white transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 md:space-y-8 custom-scrollbar pb-24 md:pb-6">

            <section class="space-y-6">
                <div class="flex gap-4 md:gap-5">
                    <div class="relative group cursor-pointer shrink-0" onclick="document.getElementById('file-avatar').click()">
                        <img id="avatar-preview" src="" class="w-20 h-20 md:w-24 md:h-24 rounded-2xl object-cover border-2 border-white/10 group-hover:border-indigo-500 transition shadow-lg bg-zinc-900">
                        <div class="absolute inset-0 bg-black/60 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition backdrop-blur-sm">
                            <i data-lucide="camera" class="text-white w-6 h-6"></i>
                        </div>
                        <div id="avatar-loading" class="hidden absolute inset-0 bg-black/80 rounded-2xl flex items-center justify-center">
                            <i data-lucide="loader-2" class="text-indigo-500 w-6 h-6 animate-spin"></i>
                        </div>
                    </div>
                    <div class="flex-1 space-y-3 min-w-0">
                        <div>
                            <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mb-1 block">Your Handle</label>
                            <div class="flex items-center bg-zinc-900/50 border border-white/5 rounded-xl px-3 focus-within:border-indigo-500/50 focus-within:bg-zinc-900 transition">
                                <span class="text-zinc-500 text-xs font-mono shrink-0">/bio/</span>
                                <input type="text" id="input-handle" class="bg-transparent w-full py-3 px-1 text-white text-sm font-bold outline-none placeholder-zinc-700 min-w-0" placeholder="username" oninput="window.appCore.updatePreview()">
                            </div>
                        </div>
                    </div>
                </div>
                <input type="file" id="file-avatar" accept="image/*" class="hidden" onchange="window.appCore.handleImageUpload(this)">

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mb-1.5 block">Display Name</label>
                        <input type="text" id="input-name" class="w-full bg-zinc-900/50 border border-white/5 rounded-xl py-3 px-4 text-white text-sm outline-none focus:border-indigo-500/50 focus:bg-zinc-900 transition font-medium" placeholder="Ex: Alexander" oninput="window.appCore.updatePreview()">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mb-1.5 block">Bio</label>
                        <textarea id="input-bio" class="w-full bg-zinc-900/50 border border-white/5 rounded-xl py-3 px-4 text-zinc-300 text-sm outline-none focus:border-indigo-500/50 focus:bg-zinc-900 transition min-h-[80px] resize-none" placeholder="Short description..." oninput="window.appCore.updatePreview()"></textarea>
                    </div>
                </div>
            </section>

            <hr class="border-white/5">

            <section>
                <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider mb-4 block flex items-center gap-2">
                    <i data-lucide="palette" class="w-3 h-3"></i> Select Theme
                </label>
                <div id="theme-list" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            </section>

            <hr class="border-white/5">

            <section>
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider flex items-center gap-2">
                        <i data-lucide="link" class="w-3 h-3"></i> Links
                    </label>
                    <button onclick="window.appCore.addLink()" class="text-[10px] bg-white/5 hover:bg-indigo-600 hover:text-white text-zinc-400 px-4 py-2 rounded-lg font-bold transition flex items-center gap-1.5 border border-white/5">
                        <i data-lucide="plus" class="w-3 h-3"></i> ADD LINK
                    </button>
                </div>
                <div id="links-container" class="space-y-3 pb-4"></div>
            </section>

        </div>

        <div class="p-4 md:p-6 border-t border-white/5 bg-[#0c0c0e] shrink-0 sticky bottom-0">
            <button id="btn-deploy" onclick="window.appCore.deploy()" class="w-full bg-white text-black hover:bg-indigo-500 hover:text-white font-bold py-4 rounded-xl transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.05)] hover:shadow-[0_0_30px_rgba(99,102,241,0.4)] flex items-center justify-center gap-2 text-sm active:scale-[0.98]">
                <i data-lucide="rocket" class="w-4 h-4"></i>
                <span class="tracking-widest">PUBLISH SITE</span>
            </button>
        </div>
    </div>

    <div id="panel-preview" class="hidden md:flex flex-1 items-center justify-center relative overflow-hidden bg-[#050505] h-full">
        <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#333 1px, transparent 1px); background-size: 24px 24px;"></div>

        <div id="phone-frame" class="relative z-10 w-full h-full md:w-[375px] md:h-[750px] md:border-[12px] md:border-[#1a1a1a] md:rounded-[50px] bg-black shadow-2xl ring-1 ring-white/10 overflow-hidden transform transition-all duration-500">
            <div class="hidden md:flex absolute top-0 left-1/2 -translate-x-1/2 h-[25px] w-[100px] bg-black rounded-b-[16px] z-50 items-center justify-center border-b border-white/5"></div>
            <iframe id="preview-frame" class="w-full h-full border-0 bg-[#000] md:rounded-[38px]"></iframe>
        </div>

        <div class="absolute bottom-8 text-center hidden md:block">
            <span class="text-[10px] text-zinc-500 font-mono tracking-widest uppercase animate-pulse">● Live Preview Active</span>
        </div>
    </div>
</div>
