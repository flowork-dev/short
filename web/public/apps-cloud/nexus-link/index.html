<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NEXUS BUILDER</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="../../assets/js/auto-tracker.js"></script>
    <style>
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', sans-serif; overflow: hidden; overscroll-behavior: none; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .hidden-view { display: none !important; }

        /* Scrollbar Halus */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        @media (max-width: 640px) {
            ::-webkit-scrollbar { display: none; }
        }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script src="js/theme-loader.js"></script>
    <script src="themes/glass.js"></script>
    <script src="themes/neon.js"></script>
    <script src="themes/luxury.js"></script>
    <script src="themes/polar.js"></script>
    <script src="themes/crimson.js"></script>
    <script src="themes/vapor.js"></script>
    <script src="themes/brutal.js"></script>
    <script src="themes/emerald.js"></script>
    <script src="themes/terminal.js"></script>
</head>
<body class="flex flex-col h-screen antialiased selection:bg-indigo-500/30">

    <main class="flex-grow relative overflow-hidden h-full w-full">
        <div id="view-app" class="fade-in h-full w-full relative"></div>
    </main>

    <div id="result-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[9999] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 p-4">
        <div class="bg-[#18181b] border border-white/10 p-6 md:p-8 rounded-2xl w-full max-w-sm shadow-2xl transform scale-95 transition-all duration-300 relative overflow-hidden" id="modal-box">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-green-500/20 rounded-full blur-[50px] -z-10"></div>
            <div class="text-center relative z-10">
                <div class="w-14 h-14 md:w-16 md:h-16 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 ring-1 ring-green-500/50">
                    <i data-lucide="check" class="w-6 h-6 md:w-8 md:h-8"></i>
                </div>
                <h3 class="text-xl md:text-2xl font-bold text-white font-display mb-2">Bio Published!</h3>
                <div id="modal-content" class="space-y-4 mt-4 text-sm md:text-base"></div>
                <button onclick="document.getElementById('result-modal').classList.remove('active'); document.getElementById('result-modal').classList.add('opacity-0', 'pointer-events-none')"
                    class="mt-6 w-full py-3.5 bg-zinc-800 hover:bg-zinc-700 active:scale-95 text-white rounded-xl font-medium transition text-sm">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>

    <script>
        window.toggleMobileView = function(mode) {
            const editor = document.getElementById('panel-editor');
            const preview = document.getElementById('panel-preview');
            const tabEdit = document.getElementById('tab-edit');
            const tabPreview = document.getElementById('tab-preview');

            // Cek dulu elemennya ada gak (biar gak error kalau dipanggil kecepetan)
            if(!editor || !preview) return;

            if (mode === 'edit') {
                // Show Editor, Hide Preview
                editor.classList.remove('hidden');
                preview.classList.add('hidden');
                preview.classList.remove('flex');

                // Style Tabs
                tabEdit.classList.add('bg-indigo-600', 'text-white', 'shadow');
                tabEdit.classList.remove('text-zinc-500');
                tabPreview.classList.remove('bg-indigo-600', 'text-white', 'shadow');
                tabPreview.classList.add('text-zinc-500');

            } else {
                // Hide Editor, Show Preview
                editor.classList.add('hidden');
                preview.classList.remove('hidden');
                preview.classList.add('flex'); // Add flex to center content

                // Style Tabs
                tabPreview.classList.add('bg-indigo-600', 'text-white', 'shadow');
                tabPreview.classList.remove('text-zinc-500');
                tabEdit.classList.remove('bg-indigo-600', 'text-white', 'shadow');
                tabEdit.classList.add('text-zinc-500');
            }
        };
    </script>
</body>
</html>
