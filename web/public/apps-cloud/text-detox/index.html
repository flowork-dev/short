<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Text Detox | AI Cleaner</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-core: #050505;
            --panel-bg: #0a0b10;
            --accent: #00ff9d;
            --danger: #ff4d4d;
        }

        body {
            background-color: var(--bg-core);
            color: #e0f0ff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; /* Lock Body */
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        .font-hud { font-family: 'Rajdhani', sans-serif; }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        textarea { resize: none !important; }

        /* Toast Animation */
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="h-screen flex flex-col bg-[#050505]">

    <div class="shrink-0 h-16 bg-[#0a0b10] border-b border-[#222] flex items-center justify-between px-4 z-30 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-[#002b1f] border border-[#005c42] flex items-center justify-center">
                <i data-lucide="shield-check" class="text-[#00ff9d] w-4 h-4"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg font-hud tracking-[0.1em] text-white leading-none">TEXT<span class="text-[#00ff9d]">DETOX</span></h1>
                <span id="status-badge" class="text-[9px] font-bold text-gray-500 tracking-widest">SYSTEM ONLINE</span>
            </div>
        </div>
        <div class="flex items-center gap-4 text-right">
            <div>
                <span class="text-[8px] text-gray-500 font-bold tracking-widest block uppercase">REMOVED</span>
                <span id="count-removed" class="text-red-500 font-mono font-bold text-sm">0</span>
            </div>
            <div>
                <span class="text-[8px] text-gray-500 font-bold tracking-widest block uppercase">CLEAN</span>
                <span id="count-kept" class="text-[#00ff9d] font-mono font-bold text-sm">0</span>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative overflow-hidden">

        <div class="flex-1 bg-[#08080a] relative border-b border-[#222] flex flex-col min-h-[35%]">
            <div class="absolute top-0 left-0 w-full p-2 px-3 bg-gradient-to-b from-black/90 to-transparent z-10 flex justify-between items-center pointer-events-none">
                <span class="text-[9px] font-bold text-red-400 bg-red-900/20 px-2 py-0.5 rounded border border-red-900/50">INPUT (DIRTY)</span>
                <button onclick="DetoxEngine.paste()" class="pointer-events-auto text-[9px] font-bold text-gray-400 hover:text-white flex items-center gap-1 bg-black/60 px-2 py-1 rounded border border-gray-800 active:scale-95 transition">
                    <i data-lucide="clipboard" class="w-3 h-3"></i> PASTE
                </button>
            </div>
            <textarea id="input-text"
                class="w-full h-full bg-transparent text-gray-300 p-4 pt-10 outline-none font-mono text-sm leading-relaxed placeholder-gray-700 custom-scroll"
                placeholder="Paste AI generated text here to clean..."></textarea>
        </div>

        <div class="h-12 bg-[#0a0b10] border-y border-[#222] flex items-center justify-center relative z-20 shadow-xl">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2">
                <button onclick="DetoxEngine.process()"
                    class="w-12 h-12 bg-[#00ff9d] hover:bg-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(0,255,157,0.3)] transition-transform hover:scale-110 active:scale-90 group border-4 border-[#0a0b10]">
                    <i data-lucide="arrow-down" class="w-6 h-6 text-black group-hover:animate-bounce"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 bg-[#050505] relative flex flex-col min-h-[35%]">
            <div class="absolute top-0 left-0 w-full p-2 px-3 bg-gradient-to-b from-black/90 to-transparent z-10 flex justify-between items-center pointer-events-none">
                <span class="text-[9px] font-bold text-[#00ff9d] bg-[#00ff9d]/10 px-2 py-0.5 rounded border border-[#00ff9d]/30">OUTPUT (CLEAN)</span>
                <button onclick="DetoxEngine.copy()" class="pointer-events-auto text-[9px] font-bold text-[#00ff9d] hover:text-white flex items-center gap-1 bg-[#00ff9d]/10 hover:bg-[#00ff9d]/20 px-2 py-1 rounded border border-[#00ff9d]/30 active:scale-95 transition">
                    <i data-lucide="copy" class="w-3 h-3"></i> COPY
                </button>
            </div>
            <textarea id="output-text" readonly
                class="w-full h-full bg-transparent text-[#00ff9d] p-4 pt-10 outline-none font-mono text-sm leading-relaxed placeholder-gray-800 custom-scroll"
                placeholder="Clean result will appear here..."></textarea>
        </div>

        <div class="bg-[#050505] border-t border-[#222]">
            <div id="global-footer"></div>
        </div>

    </div>

    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 pointer-events-none toast-enter">
        <div class="bg-[#1f2233] border border-[#00ff9d]/30 text-white px-4 py-3 rounded shadow-2xl flex items-center gap-3">
            <i data-lucide="check-circle" class="text-[#00ff9d] w-5 h-5"></i>
            <span id="toast-message" class="text-xs font-bold font-hud tracking-widest">OPERATION SUCCESS</span>
        </div>
    </div>

    <script>
        // 1. FOOTER INJECTOR
        async function loadFooter() {
            try {
                const response = await fetch('/assets/lander/footer.html');
                if (!response.ok) throw new Error('Footer not found');
                let html = await response.text();

                // AUTO YEAR UPDATE
                const realYear = new Date().getFullYear();
                html = html.replace('{YEAR}', realYear);

                document.getElementById('global-footer').innerHTML = html;
                if(window.lucide) window.lucide.createIcons();
            } catch (e) {
                console.warn("Footer load failed:", e);
                const year = new Date().getFullYear();
                document.getElementById('global-footer').innerHTML =
                    `<div class="p-6 text-center text-gray-600 font-mono text-[10px] uppercase tracking-widest">© ${year} FLOWORK SYSTEM</div>`;
            }
        }
        loadFooter();

        // 2. CUSTOM TOAST SYSTEM
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const message = document.getElementById('toast-message');
            message.innerText = msg;
            container.classList.add('toast-active');
            container.classList.remove('toast-enter');

            setTimeout(() => {
                container.classList.remove('toast-active');
                container.classList.add('toast-enter');
            }, 2000);
        }

        // 3. DETOX ENGINE (CORE LOGIC)
        // Note: Logic is preserved/inferred based on HTML structure
        const DetoxEngine = {
            init() {
                console.log("DETOX ENGINE ONLINE");
                if(window.lucide) lucide.createIcons();
            },

            async paste() {
                try {
                    const text = await navigator.clipboard.readText();
                    document.getElementById('input-text').value = text;
                    this.process(); // Auto process on paste
                    showToast("TEXT PASTED");
                } catch (err) {
                    showToast("CLIPBOARD ACCESS DENIED", "error");
                }
            },

            copy() {
                const text = document.getElementById('output-text').value;
                if (!text) return showToast("OUTPUT EMPTY", "error");

                navigator.clipboard.writeText(text).then(() => {
                    showToast("RESULT COPIED");
                });
            },

            process() {
                const input = document.getElementById('input-text').value;
                if (!input) return;

                // --- CLEANING LOGIC START ---
                // Removing common AI artifacts
                let cleaned = input
                    .replace(/\*\*/g, '') // Remove bold markdown
                    .replace(/^["']|["']$/g, '') // Remove surrounding quotes
                    .replace(/Here is the.*/gi, '') // Remove AI intros
                    .replace(/Certainly.*/gi, '')
                    .replace(/Sure,.*/gi, '')
                    .replace(/I can help.*/gi, '')
                    .replace(/In conclusion,.*/gi, '')
                    .replace(/Overall,.*/gi, '')
                    .replace(/^\s*[-•]\s*/gm, '') // Remove bullets if needed (optional)
                    .trim();
                // --- CLEANING LOGIC END ---

                document.getElementById('output-text').value = cleaned;

                // Update Stats
                const removedCount = input.length - cleaned.length;
                document.getElementById('count-removed').innerText = removedCount > 0 ? removedCount : 0;
                document.getElementById('count-kept').innerText = cleaned.length;

                document.getElementById('status-badge').innerText = "CLEANING COMPLETE";
                document.getElementById('status-badge').classList.add("text-[#00ff9d]");
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            DetoxEngine.init();
            if(window.lucide) lucide.createIcons();
        });

    </script>
</body>
</html>
