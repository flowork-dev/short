<div class="animate__animated animate__fadeIn h-full overflow-hidden">
    <div class="flex flex-col lg:flex-row h-full">

        <div class="flex-grow bg-[#1a1b26] p-4 md:p-10 preview-scroll-area custom-scrollbar">

            <div id="loading-overlay" class="fixed inset-0 bg-black/40 z-[100] hidden flex flex-col items-center justify-center backdrop-blur-sm">
                <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-xs orbitron text-purple-300 tracking-[0.3em]">SYNCHRONIZING...</p>
            </div>

            <div class="paper-preview">
                <div class="flex justify-between items-start mb-16">
                    <div>
                        <div class="w-20 h-2 bg-purple-600 mb-6"></div>
                        <h2 class="text-5xl font-extrabold text-gray-900 tracking-tighter mb-2">INVOICE</h2>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-gray-400">REFERENCE:</span>
                            <input id="inv-number" type="text" class="w-32 font-bold text-purple-600 bg-purple-50 px-2 py-1 rounded outline-none" value="INV/2026/001">
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="mb-4">
                            <label class="text-[9px] text-gray-400 font-black uppercase tracking-widest block mb-1">Issue Date</label>
                            <input id="inv-date" type="date" class="text-right font-bold text-gray-800 bg-transparent outline-none border-b-2 border-transparent focus:border-purple-200">
                        </div>
                        <div>
                            <label class="text-[9px] text-gray-400 font-black uppercase tracking-widest block mb-1">Payment Term</label>
                            <select class="text-right font-bold text-gray-800 bg-transparent outline-none">
                                <option>Due on Receipt</option>
                                <option>NET 15</option>
                                <option>NET 30</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-12 mb-16 pb-12 border-b border-gray-100">
                    <div>
                        <label class="text-[10px] text-purple-600 font-black uppercase tracking-widest mb-4 block">Originator</label>
                        <div id="preview-sender-name" class="text-xl font-black text-gray-900 leading-none mb-2 uppercase">COMMANDER</div>
                        <div id="preview-sender-email" class="text-gray-500 text-sm font-medium mb-1">contact@hq.mil</div>
                        <div id="preview-sender-address" class="text-gray-400 text-xs whitespace-pre-wrap leading-relaxed">Central Intelligence Base</div>
                    </div>
                    <div class="text-right">
                        <label class="text-[10px] text-purple-600 font-black uppercase tracking-widest mb-4 block">Target Entity</label>
                        <input id="client-name" type="text" class="w-full text-right text-xl font-black text-gray-900 placeholder-gray-200 bg-transparent outline-none" placeholder="RECIPIENT NAME">
                        <input id="client-email" type="text" class="w-full text-right text-sm text-gray-500 placeholder-gray-200 bg-transparent outline-none mt-1" placeholder="recipient@target.com">
                        <textarea id="client-address" rows="2" class="w-full text-right text-xs text-gray-400 placeholder-gray-200 bg-transparent outline-none mt-2 resize-none" placeholder="Street Address / HQ"></textarea>
                    </div>
                </div>

                <div class="mb-12">
                    <div class="grid grid-cols-12 gap-4 border-y-2 border-gray-900 py-4 mb-6 text-[10px] font-black text-gray-900 uppercase tracking-[0.2em]">
                        <div class="col-span-6">Operation Details</div>
                        <div class="col-span-2 text-center">Unit</div>
                        <div class="col-span-3 text-right">Value</div>
                        <div class="col-span-1"></div>
                    </div>

                    <div id="items-container">
                        </div>

                    <button onclick="window.appCore.addItem()" class="mt-6 px-4 py-2 bg-gray-900 text-white text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition-all flex items-center gap-2">
                        <i class="mdi mdi-plus-box"></i> Add Line Objective
                    </button>
                </div>

                <div class="flex justify-between items-end">
                    <div class="w-1/2">
                        <label class="text-[9px] text-gray-400 font-black uppercase tracking-widest block mb-2">Tactical Notes</label>
                        <textarea id="inv-notes" class="w-full text-xs text-gray-500 bg-gray-50 p-4 rounded border-none outline-none resize-none h-24" placeholder="Input banking coordinates or specialized instructions..."></textarea>
                    </div>
                    <div class="w-64">
                        <div class="flex justify-between text-xs font-bold text-gray-400 mb-2 uppercase">
                            <span>Subtotal</span>
                            <span id="val-subtotal" class="text-gray-900">0</span>
                        </div>
                        <div class="flex justify-between text-xs font-bold text-gray-400 mb-2 uppercase">
                            <span>Admin Tax</span>
                            <span id="val-tax" class="text-gray-900">0</span>
                        </div>
                        <div class="flex justify-between text-xs font-bold text-red-500 mb-4 uppercase">
                            <span>Tactical Disc</span>
                            <span id="val-discount">0</span>
                        </div>
                        <div class="bg-gray-900 p-4 text-white flex justify-between items-center">
                            <span class="text-[10px] font-black tracking-widest uppercase">Total Due</span>
                            <span id="val-total" class="text-xl font-black">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[400px] bg-[#0f1016] border-l border-[#2d2e3e] p-6 overflow-y-auto custom-scrollbar shadow-2xl z-10">

            <div class="space-y-6">
                <div class="space-y-4">
                    <h3 class="orbitron text-xs text-white font-bold tracking-widest flex items-center gap-3">
                        <span class="w-8 h-px bg-purple-500"></span> ENGINE CONFIG
                    </h3>

                    <div>
                        <label class="tac-label">Currency Unit</label>
                        <div class="flex bg-black p-1 rounded-lg border border-[#2d2e3e]">
                            <button onclick="window.appCore.setCurrency('IDR')" id="curr-idr" class="flex-1 py-2 text-xs font-black bg-purple-900/40 text-purple-400 border border-purple-500/50 rounded-md">IDR</button>
                            <button onclick="window.appCore.setCurrency('USD')" id="curr-usd" class="flex-1 py-2 text-xs font-bold text-gray-500 transition-all">USD</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="tac-label">Tax Rate (%)</label>
                            <input id="input-tax" type="number" class="tac-input" placeholder="0" oninput="window.appCore.calculate()">
                        </div>
                        <div>
                            <label class="tac-label">Discount Amt</label>
                            <input id="input-discount" type="number" class="tac-input" placeholder="0" oninput="window.appCore.calculate()">
                        </div>
                    </div>
                </div>

                <div class="space-y-4 pt-6 border-t border-[#2d2e3e]">
                    <div class="flex justify-between items-center">
                        <h3 class="orbitron text-xs text-white font-bold tracking-widest flex items-center gap-3">
                            <span class="w-8 h-px bg-cyan-500"></span> ORIGIN DATA
                        </h3>
                        <button onclick="window.appCore.saveProfile()" class="text-[10px] font-black text-green-400 hover:text-white uppercase tracking-wider">
                            <i class="mdi mdi-check-decagram mr-1"></i> Secure
                        </button>
                    </div>
                    <div class="space-y-4">
                        <input id="sender-name" type="text" class="tac-input" placeholder="Originator Name">
                        <input id="sender-email" type="text" class="tac-input" placeholder="secure-comms@hq.mil">
                        <textarea id="sender-address" rows="3" class="tac-input resize-none" placeholder="HQ Coordinates / Physical Address"></textarea>
                    </div>
                </div>

                <div class="pt-10">
                    <button onclick="window.appCore.generatePDF()" class="btn-action w-full py-5 rounded-xl text-sm font-black flex items-center justify-center gap-4 group">
                        <span>EXECUTE EXPORT (PDF)</span>
                        <i class="mdi mdi-arrow-right group-hover:translate-x-2 transition-transform"></i>
                    </button>
                    <p class="text-[9px] text-center text-gray-600 mt-4 uppercase tracking-[0.2em] font-bold">
                        Calculated via Neural Bridge V4.1
                    </p>
                </div>
            </div>

        </div>

    </div>
</div>
