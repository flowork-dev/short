<div id="vue-root" class="h-full flex flex-col">
    <v-app theme="dark" style="background: transparent;">
        <v-main class="h-full flex flex-col p-0 overflow-hidden">

            <div class="flex flex-col md:flex-row justify-between items-center p-3 md:p-4 border-b border-gray-800 bg-[#121218] z-10 shrink-0 gap-3 md:gap-0">

                <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                    <div class="flex items-center gap-3">
                        <div class="border border-cyan-500 p-1.5 md:p-2 rounded bg-[#1a1a24]">
                            <v-icon icon="mdi-language-markdown" color="cyan-accent-2" size="24" class="md:text-4xl"></v-icon>
                        </div>
                        <div>
                            <h1 class="orbitron text-lg md:text-2xl font-bold text-white tracking-widest leading-none">
                                MARK <span class="text-cyan-400">CMD</span>
                            </h1>
                        </div>
                    </div>
                    <button onclick="window.appCore.switchTab('lander')" class="md:hidden text-[10px] font-bold text-gray-500 hover:text-white border-l border-gray-700 pl-3 flex items-center gap-1">
                        BACK <v-icon size="small">mdi-arrow-right</v-icon>
                    </button>
                </div>

                <div class="w-full md:w-auto overflow-hidden">
                    <div class="flex items-center gap-2 md:gap-3 overflow-x-auto custom-scrollbar pb-1 md:pb-0 no-scrollbar">
                        <div class="flex bg-black rounded border border-gray-800 p-1 shrink-0">
                            <button @click="insertTemplate('basic')" class="px-3 py-1.5 text-[10px] md:text-xs font-bold text-gray-400 hover:text-white hover:bg-gray-800 rounded transition flex items-center gap-1 whitespace-nowrap">
                                <v-icon size="x-small">mdi-file-document-outline</v-icon> BASIC
                            </button>
                            <button @click="insertTemplate('api')" class="px-3 py-1.5 text-[10px] md:text-xs font-bold text-gray-400 hover:text-white hover:bg-gray-800 rounded transition flex items-center gap-1 whitespace-nowrap">
                                <v-icon size="x-small">mdi-api</v-icon> API DOCS
                            </button>
                        </div>

                        <button @click="downloadMD" class="bg-cyan-900/50 hover:bg-cyan-700 text-cyan-400 border border-cyan-500 px-4 py-1.5 text-[10px] md:text-xs font-bold rounded transition flex items-center gap-2 shadow-[0_0_10px_rgba(0,243,255,0.2)] whitespace-nowrap shrink-0">
                            <v-icon size="x-small">mdi-download</v-icon> SAVE .MD
                        </button>

                        <button onclick="window.appCore.switchTab('lander')" class="hidden md:flex text-xs font-bold text-gray-500 hover:text-white border-l border-gray-700 pl-4 ml-2 items-center gap-1 whitespace-nowrap shrink-0">
                            <v-icon size="small">mdi-arrow-left</v-icon> BACK
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">

                <div class="w-full md:w-1/2 flex flex-col border-b md:border-b-0 md:border-r border-gray-800 bg-[#0a0a0f] h-1/2 md:h-auto min-h-0">
                    <div class="bg-[#15151a] px-3 md:px-4 py-1.5 md:py-2 border-b border-gray-800 flex justify-between items-center shrink-0">
                        <span class="text-[10px] md:text-xs text-gray-500 font-bold tracking-widest font-mono">SOURCE INPUT</span>
                        <v-icon size="x-small" color="grey">mdi-code-braces</v-icon>
                    </div>
                    <div class="flex-1 relative">
                        <textarea v-model="input" class="w-full h-full bg-transparent p-4 md:p-6 text-white font-mono text-xs md:text-base leading-relaxed resize-none focus:outline-none custom-scrollbar" placeholder="# Start typing Markdown here..."></textarea>
                    </div>
                </div>

                <div class="w-full md:w-1/2 flex flex-col bg-[#0f111a] h-1/2 md:h-auto min-h-0">
                    <div class="bg-[#15151a] px-3 md:px-4 py-1.5 md:py-2 border-b border-gray-800 flex justify-between items-center shrink-0">
                        <span class="text-[10px] md:text-xs text-cyan-500 font-bold tracking-widest font-mono">LIVE PREVIEW</span>
                        <v-icon size="x-small" color="cyan">mdi-eye</v-icon>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8">
                        <div class="prose prose-invert prose-sm md:prose-base max-w-none prose-headings:font-bold prose-h1:text-xl md:prose-h1:text-3xl prose-h2:text-lg md:prose-h2:text-2xl prose-h2:border-b prose-h2:border-gray-700 prose-h2:pb-2 prose-h2:mt-6 prose-code:text-cyan-400 prose-code:bg-gray-800 prose-code:px-1 prose-code:rounded prose-pre:bg-[#1a1a20] prose-pre:border prose-pre:border-gray-700" v-html="compiledMarkdown"></div>
                    </div>
                </div>

            </div>

        </v-main>
    </v-app>
</div>
