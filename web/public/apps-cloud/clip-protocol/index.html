<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Protocol</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    <script src="../../assets/js/auto-tracker.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@5.x/css/materialdesignicons.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS GLOBAL & UTILITY */
        .hidden-view { display: none !important; }

        /* Custom Scrollbar Mobile Friendly */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #171925; }
        ::-webkit-scrollbar-thumb { background: #3a3962; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #54d7f6; }

        /* Font Setup */
        body { font-family: 'Inter', sans-serif; }
        .orbitron { font-family: 'Orbitron', monospace; }

        /* Animation Utility */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#171925] text-[#e0f0ff] flex flex-col h-screen overflow-hidden">

    <nav class="h-16 border-b border-[#3a3962] flex items-center justify-between px-6 bg-[#171925] z-50">
        <div class="flex items-center gap-2">
            <i class="mdi mdi-scissors-cutting text-[#54d7f6] text-2xl"></i>
            <div class="font-bold text-xl orbitron tracking-wider">CLIP<span class="text-[#54d7f6]">PROTOCOL</span></div>
        </div>

        <div class="flex gap-6 font-mono text-sm">
            <button id="tab-app" class="opacity-100 text-[#54d7f6] transition-all flex items-center gap-2 cursor-default">
                <i data-lucide="cpu" class="w-4 h-4"></i> ENGINE
            </button>
        </div>
    </nav>

    <main class="flex-1 relative w-full h-full overflow-y-auto">
        <div id="view-app" class="w-full min-h-full h-full fade-in"></div>
    </main>

    <script type="module">
        import { init } from './js/core.js';

        const AppCore = {
            isLoggedIn: false, // Default state

            async init() {
                console.log("SYSTEM BOOT... FLOWORK V2.0");

                // 1. Cek Status Login (Standard Flowork)
                const userSession = localStorage.getItem('flowork_session');
                if (userSession) this.isLoggedIn = true;

                // 2. Load Partials (Lander removed)
                await this.loadPartial('view-app', 'partials/app.html');

                // 3. Init Icons
                if(window.lucide) window.lucide.createIcons();

                // 4. Trigger App Engine Init (Moved from switchTab)
                setTimeout(() => {
                    init();
                }, 100);
            },

            // Fungsi Helper Load HTML
            async loadPartial(containerId, url) {
                try {
                    const res = await fetch(url);
                    if(!res.ok) throw new Error("Load failed");
                    const html = await res.text();
                    document.getElementById(containerId).innerHTML = html;
                } catch(e) {
                    console.error("Partial Load Error:", e);
                    document.getElementById(containerId).innerHTML = `<div class="p-10 text-red-500">Error Loading ${url}</div>`;
                }
            }

            // switchTab function removed
        };

        // Boot System
        window.appCore = AppCore;
        // Kita panggil init setelah DOM ready
        window.addEventListener('DOMContentLoaded', () => AppCore.init());

        // Listener Login dari Flowork Environment
        window.addEventListener('message', (e) => {
            if (e.data?.type === 'FLOWORK_IDENTITY_SYNC') {
                AppCore.isLoggedIn = true;
                console.log("Identity Synced!");
            }
        });
    </script>
</body>
</html>
