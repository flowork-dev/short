<div class="clip-layout">
    <div class="panel-left">
        <div class="panel-header"><i class="mdi mdi-video-input-antenna"></i> STUDIO MONITOR</div>

        <div class="toolbar-grid">
            <div class="mode-selector">
                <div class="mode-opt active" data-mode="original" onclick="setMode('original')"><i class="mdi mdi-youtube"></i> ORIG</div>
                <div class="mode-opt" data-mode="tiktok" onclick="setMode('tiktok')"><i class="mdi mdi-cellphone"></i> TIKTOK</div>
            </div>
            <div class="res-selector">
                <select id="resSelect" class="cyber-select">
                    <option value="original">AS SOURCE</option>
                    <option value="720">HD 720p</option>
                    <option value="1080" selected>FHD 1080p</option>
                    <option value="1440">2K QHD</option>
                    <option value="2160">4K UHD</option>
                </select>
            </div>
        </div>

        <div class="video-workspace">
            <div class="upload-overlay" id="uploadPlaceholder">
                <input type="file" id="videoInput" accept="video/*">
                <div class="upload-content">
                    <i class="mdi mdi-upload-network text-cyan"></i>
                    <h3>TAP TO UPLOAD</h3>
                </div>
            </div>

            <div id="videoStage" class="video-stage hidden">
                <video id="videoPreview" playsinline controls></video>

                <div id="overlayMirror" class="overlay-mirror">

                    <div id="cropBox" class="crop-box hidden">
                        <div class="drag-area" data-target="crop"></div>
                        <div class="handle nw" data-target="crop" data-dir="nw"></div><div class="handle ne" data-target="crop" data-dir="ne"></div>
                        <div class="handle sw" data-target="crop" data-dir="sw"></div><div class="handle se" data-target="crop" data-dir="se"></div>
                        <span class="crop-label">CROP ZONE</span>
                    </div>

                    <div id="captionBox" class="caption-box">
                        <div class="drag-area" data-target="caption"></div>
                        <div class="handle-cap nw" data-target="caption" data-dir="nw"></div><div class="handle-cap ne" data-target="caption" data-dir="ne"></div>
                        <div class="handle-cap sw" data-target="caption" data-dir="sw"></div><div class="handle-cap se" data-target="caption" data-dir="se"></div>

                        <div class="caption-content">
                            <div id="liveCaptionText">PREVIEW TEXT</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="player-controls">
            <div class="file-meta"><i class="mdi mdi-file-outline"></i> <span id="fileInfo">No Media</span></div>
            <button id="smartCopyBtn" class="cyber-btn sm state-start" disabled>SET START [A]</button>
        </div>
    </div>

    <div class="panel-right">
        <div class="tabs-header">
            <div class="tab active" onclick="switchTab('manual')">MANUAL</div>
            <div class="tab" onclick="switchTab('magic')">MAGIC</div>
            <div class="tab" onclick="switchTab('style')">STYLE</div>
        </div>

        <div class="panel-content-wrapper">
            <div id="tab-manual" class="tab-content active">
                <div class="help-text">FORMAT: <span class="text-cyan">START-END|Caption</span></div>
                <textarea id="timeInput" spellcheck="false" placeholder="00:00:00-00:00:05|Halo Guys!&#10;00:00:05-00:00:10|Welcome Back"></textarea>
            </div>

            <div id="tab-magic" class="tab-content">
                <div class="magic-tools">
                    <div class="tool-group"><label>DURASI (DETIK)</label><input type="number" id="splitDuration" value="30"><button class="cyber-btn sm" onclick="generateByDuration()">GEN</button></div>
                    <div class="tool-group"><label>JUMLAH BAGIAN</label><input type="number" id="splitCount" value="5"><button class="cyber-btn sm" onclick="generateByCount()">GEN</button></div>
                </div>
            </div>

            <div id="tab-style" class="tab-content">
                <div class="magic-tools">
                    <div class="tool-group"><label>FONT FAMILY</label><select id="fontSelect" class="cyber-select-box" onchange="loadSelectedFont()"></select></div>
                    <div class="tool-group"><label>TEXT COLOR</label><input type="color" id="textColor" value="#ffffff" oninput="updateStyle()"></div>
                    <div class="tool-group"><label>BG COLOR</label><input type="color" id="bgColor" value="#000000" oninput="updateStyle()"></div>
                    <div class="tool-group"><label>BG OPACITY</label><input type="range" id="bgOpacity" min="0" max="1" step="0.1" value="0.7" oninput="updateStyle()"></div>
                    <div class="tool-group"><label>FONT SIZE</label><input type="range" id="fontSize" min="10" max="100" value="30" oninput="updateStyle()"></div>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="terminal-area" id="terminalLog"><div class="log-line">> SYSTEM v8.5 READY</div></div>
            <div class="action-bar"><button id="processBtn" class="cyber-btn full">PROCESS BATCH</button></div>
        </div>
    </div>
</div>

<style>
    /* CSS STYLE (SAMA SEPERTI SEBELUMNYA) */
    .clip-layout { display: flex; width: 100%; height: 100%; background: #050507; font-family: 'Inter', sans-serif; overflow: hidden; }
    .hidden { display: none !important; }
    .text-cyan { color: #00f5ff; }

    .panel-left { width: 50%; display: flex; flex-direction: column; background: #0a0a0f; border-right: 1px solid #222; position: relative; }
    .panel-right { width: 50%; display: flex; flex-direction: column; background: #050507; }
    .panel-header { padding: 12px 15px; background: #08080a; border-bottom: 1px solid #222; font-family: 'Orbitron'; font-size: 0.75rem; color: #888; }

    .video-workspace { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .upload-overlay { position: absolute; width: 100%; height: 100%; z-index: 50; display: flex; align-items: center; justify-content: center; background: #000; }
    .upload-overlay input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .upload-content { text-align: center; pointer-events: none; }
    .upload-content i { font-size: 3rem; color: #00f5ff; }

    .video-stage { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
    video { max-width: 100%; max-height: 100%; display: block; }

    /* MIRROR (CRITICAL) */
    .overlay-mirror {
        position: absolute;
        pointer-events: none;
        z-index: 10;
        /* border: 1px solid red; */
    }

    .crop-box, .caption-box { position: absolute; pointer-events: auto; box-sizing: border-box; }
    .crop-box { width: 100px; height: 177px; border: 2px solid #00f5ff; background: rgba(0, 245, 255, 0.1); z-index: 5; }
    .crop-label { position: absolute; top: -20px; left: 0; background: #00f5ff; color: #000; font-size: 9px; padding: 2px 4px; font-weight: bold; }

    .caption-box { width: 300px; height: 80px; top: 10%; left: 10%; border: 2px dashed #ff00ff; background: rgba(0,0,0,0.5); z-index: 20; display: flex; align-items: center; justify-content: center; }
    .caption-content { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 2; }
    #liveCaptionText { color: #fff; font-weight: bold; text-align: center; white-space: pre-wrap; word-wrap: break-word; line-height: 1.2; width: 100%; padding: 5px; }

    .drag-area { position: absolute; top:0; left:0; width: 100%; height: 100%; cursor: move; z-index: 1; }
    .handle, .handle-cap { position: absolute; width: 10px; height: 10px; background: #fff; border: 1px solid #000; z-index: 30; }
    .handle-cap { background: #ff00ff; }
    .nw { top: -5px; left: -5px; cursor: nw-resize; } .ne { top: -5px; right: -5px; cursor: ne-resize; }
    .sw { bottom: -5px; left: -5px; cursor: sw-resize; } .se { bottom: -5px; right: -5px; cursor: se-resize; }
    .n { top: -5px; left: 50%; transform: translateX(-50%); cursor: n-resize; } .s { bottom: -5px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
    .w { top: 50%; left: -5px; transform: translateY(-50%); cursor: w-resize; } .e { top: 50%; right: -5px; transform: translateY(-50%); cursor: e-resize; }

    .toolbar-grid { display: flex; border-bottom: 1px solid #222; height: 40px; }
    .mode-selector { flex: 1; display: flex; }
    .mode-opt { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; color: #555; background: #0c0c10; font-family: 'Orbitron'; border-right: 1px solid #222; }
    .mode-opt.active { background: #00f5ff; color: #000; font-weight: 900; }
    .res-selector { width: 100px; }
    .cyber-select { width: 100%; height: 100%; background: #000; color: #fff; border: none; text-align: center; font-size: 0.7rem; }
    .tabs-header { display: flex; background: #08080a; border-bottom: 1px solid #222; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.75rem; color: #666; font-family: 'Orbitron'; }
    .tab.active { color: #00f5ff; background: #111; border-bottom: 2px solid #00f5ff; }
    .panel-content-wrapper { flex: 1; overflow-y: auto; padding: 15px; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    textarea { width: 100%; background: #08080a; border: 1px solid #333; color: #00f5ff; padding: 10px; height: 150px; resize: none; font-family: 'JetBrains Mono'; }
    .magic-tools { display: flex; flex-direction: column; gap: 15px; }
    .tool-group label { display: block; color: #00f5ff; font-size: 0.7rem; margin-bottom: 5px; font-family: 'Orbitron'; }
    .input-group { display: flex; gap: 10px; } .input-group input { flex: 1; background: #111; border: 1px solid #333; color: #fff; text-align: center; }
    input[type=color] { width: 100%; height: 30px; border:none; padding:0; background:none; cursor: pointer; }
    .cyber-select-box { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 8px; font-family: 'Orbitron'; font-size: 0.8rem; }
    .bottom-section { border-top: 1px solid #222; background: #000; }
    .terminal-area { height: 100px; padding: 10px; font-family: monospace; font-size: 0.7rem; overflow-y: auto; color: #666; }
    .action-bar { padding: 10px; background: #0a0a0f; }
    .cyber-btn { width: 100%; padding: 10px; background: #00f5ff; border: none; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }
    .cyber-btn:disabled { background: #333; color: #555; }
    .player-controls { padding: 10px 15px; background: #0a0a0f; border-top: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .file-meta { font-size: 0.7rem; color: #666; font-family: monospace; }
    #smartCopyBtn.state-end { background: #ff4444; color: #fff; animation: pulse 1s infinite; }

    @media (max-width: 768px) { .clip-layout { flex-direction: column; overflow-y: auto; } .panel-left, .panel-right { width: 100%; min-height: 50vh; } .video-workspace { min-height: 300px; } }
</style>
