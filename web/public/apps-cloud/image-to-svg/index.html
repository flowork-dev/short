<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image To SVG Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>
    <script src="../../assets/js/auto-tracker.js"></script>
    <style>
        :root { --bg-deep: #171925; --primary: #54d7f6; --secondary: #706bf3; --success: #00ff9d; --panel: #3a3962; --text: #e0f0ff; }
        body { background-color: var(--bg-deep); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--panel); border-radius: 4px; }
        .hidden-view { display: none !important; }

        .zoom-container { cursor: grab; transform-origin: center; transition: transform 0.1s linear; touch-action: none; will-change: transform; }
        .zoom-container:active { cursor: grabbing; }

        @media (max-width: 768px) { .mobile-hide { display: none; } }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); border-color: var(--success); color: var(--success); }
            100% { box-shadow: 0 0 0 10px rgba(0, 255, 157, 0); }
        }
        .btn-success-anim { animation: pulse-green 0.5s ease-out; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="h-14 border-b border-[#3a3962] flex items-center justify-between px-4 md:px-6 bg-[#171925] z-40 shrink-0 font-[Oswald]">
        <div class="font-bold text-lg tracking-wider text-[#54d7f6]">VECTOR<span class="text-[#706bf3]">FORGE</span></div>
        <div class="flex gap-4 text-sm font-bold">
            <button id="tab-app" class="opacity-100 text-[#54d7f6] cursor-default">ENGINE</button>
        </div>
    </nav>

    <main class="flex-1 relative w-full h-full overflow-hidden p-0">
        <div id="view-app" class="w-full h-full overflow-y-auto custom-scrollbar"></div>
    </main>

    <script>
        const AppCore = {
            currentImageRaw: null,
            generatedSVG: null,
            viewMode: 'original',
            zoomLevel: 1, panX: 0, panY: 0, isDragging: false, startX: 0, startY: 0,

            async init() {
                // Lander loadPartial removed
                await this.loadPartial('app', 'partials/app.html');
                lucide.createIcons();
                this.initLogic();
            },

            async loadPartial(id, url) {
                try { const res = await fetch(url); document.getElementById('view-'+id).innerHTML = await res.text(); } catch (e) { console.error(e); }
            },

            // switchTab function removed

            initLogic() {
                const fileInput = document.getElementById('file-input');
                if(fileInput) fileInput.addEventListener('change', (e) => this.handleFile(e.target.files[0]));

                const btnProcess = document.getElementById('btn-process');
                if(btnProcess) btnProcess.addEventListener('click', () => this.processImage());

                const wrapper = document.getElementById('preview-wrapper');
                const container = document.getElementById('preview-container');

                if(wrapper && container) {
                    wrapper.addEventListener('wheel', (e) => { e.preventDefault(); this.applyZoom(e.deltaY > 0 ? 0.9 : 1.1); });
                    wrapper.addEventListener('mousedown', (e) => { this.isDragging = true; this.startX = e.clientX - this.panX; this.startY = e.clientY - this.panY; container.style.cursor = 'grabbing'; });
                    window.addEventListener('mouseup', () => { this.isDragging = false; container.style.cursor = 'grab'; });
                    wrapper.addEventListener('mousemove', (e) => { if (!this.isDragging) return; e.preventDefault(); this.panX = e.clientX - this.startX; this.panY = e.clientY - this.startY; this.updateTransform(); });
                    wrapper.addEventListener('touchstart', (e) => { this.isDragging = true; this.startX = e.touches[0].clientX - this.panX; this.startY = e.touches[0].clientY - this.panY; });
                    wrapper.addEventListener('touchmove', (e) => { if (!this.isDragging) return; this.panX = e.touches[0].clientX - this.startX; this.panY = e.touches[0].clientY - this.startY; this.updateTransform(); });
                    wrapper.addEventListener('touchend', () => { this.isDragging = false; });
                }

                ['colors', 'blur', 'speckle'].forEach(id => {
                    const el = document.getElementById('opt-'+id);
                    if(el) el.addEventListener('input', (e) => document.getElementById('val-'+id).innerText = e.target.value);
                });
            },

            handleFile(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.currentImageRaw = e.target.result;
                    this.generatedSVG = null;
                    document.getElementById('status-text').innerText = `LOADED`;
                    this.togglePreview('original');
                    this.resetView();
                    document.getElementById('svg-code').value = "";
                    document.getElementById('code-panel').classList.add('hidden');
                    document.getElementById('btn-process').disabled = false;
                    document.getElementById('btn-process').innerText = "CONVERT SVG";
                };
                reader.readAsDataURL(file);
            },

            // --- NEW: PREPROCESSING UPSCALER ---
            preprocessImage(imgSrc, callback) {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Target width biar konsisten, misalnya 1024px.
                    // Kalau gambar asli lebih kecil, dia bakal di-upscale.
                    const targetWidth = 1024;
                    const scaleFactor = img.width < targetWidth ? targetWidth / img.width : 1;

                    canvas.width = img.width * scaleFactor;
                    canvas.height = img.height * scaleFactor;

                    // KUNCI ANTI PECAH: High Quality Smoothing saat upscale
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    callback(canvas.toDataURL('image/png'));
                };
                img.src = imgSrc;
            },

            processImage() {
                if(!this.currentImageRaw) return alert("Upload image first!");

                const btn = document.getElementById('btn-process');
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin inline w-4 h-4 mr-2"></i> PROCESSING...`;
                lucide.createIcons();

                // 1. Preprocess dulu (Upscale & Smooth)
                this.preprocessImage(this.currentImageRaw, (smoothedImage) => {

                    // 2. Settingan Engine (Karena udah di-smooth di canvas, blurradius engine bisa kecil aja)
                    const options = {
                        numberofcolors: parseInt(document.getElementById('opt-colors').value) || 48,
                        ltres: 0.5, // Sedikit lebih longgar biar kurva mengalir
                        qtres: 0.5,
                        pathomit: (parseInt(document.getElementById('opt-speckle').value) || 2) * 4, // Hapus noise lebih agresif
                        blurradius: 0, // Kita sudah pakai canvas smoothing, jadi di sini 0 biar tajam
                        strokewidth: 0, viewbox: true, scale: 1, roundcoords: 1, desc: false
                    };

                    console.log("Tracing smoothed image with options:", options);

                    try {
                        // 3. Kirim gambar yang SUDAH HALUS ke engine
                        ImageTracer.imageToSVG(smoothedImage, (svgstr) => {
                            this.generatedSVG = svgstr;
                            this.togglePreview('vector');

                            const codeArea = document.getElementById('svg-code');
                            codeArea.value = svgstr;
                            document.getElementById('code-panel').classList.remove('hidden');
                            document.getElementById('code-panel').style.display = 'flex';

                            document.getElementById('status-text').innerText = "DONE (" + (svgstr.length/1024).toFixed(1) + "KB)";
                            btn.disabled = false;
                            btn.innerText = "RE-CONVERT";
                        }, options);
                    } catch (err) {
                        alert("Failed: " + err.message);
                        btn.disabled = false;
                        btn.innerText = "RETRY";
                    }
                });
            },

            togglePreview(mode) {
                this.viewMode = mode;
                const container = document.getElementById('preview-container');
                const btnOrig = document.getElementById('btn-view-original');
                const btnVect = document.getElementById('btn-view-vector');

                if(btnOrig && btnVect) {
                    btnOrig.classList.toggle('bg-[#54d7f6]', mode === 'original');
                    btnOrig.classList.toggle('text-black', mode === 'original');
                    btnVect.classList.toggle('bg-[#54d7f6]', mode === 'vector');
                    btnVect.classList.toggle('text-black', mode === 'vector');
                }

                if (mode === 'original' && this.currentImageRaw) {
                    container.innerHTML = `<img src="${this.currentImageRaw}" class="w-full h-full object-contain pointer-events-none select-none">`;
                } else if (this.generatedSVG) {
                    const codeArea = document.getElementById('svg-code');
                    const rawSVG = codeArea ? codeArea.value : this.generatedSVG;
                    container.innerHTML = rawSVG;
                    const svgEl = container.querySelector('svg');
                    if(svgEl) {
                        svgEl.removeAttribute('width'); svgEl.removeAttribute('height');
                        svgEl.style.width = '100%'; svgEl.style.height = '100%';
                    }
                } else {
                    if(this.currentImageRaw) this.togglePreview('original');
                }
            },

            applyZoom(factor) { this.zoomLevel = Math.max(0.1, Math.min(this.zoomLevel *= factor, 20)); this.updateTransform(); },
            resetView() { this.zoomLevel = 1; this.panX = 0; this.panY = 0; this.updateTransform(); },
            updateTransform() {
                const el = document.getElementById('preview-container');
                if(el) el.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.zoomLevel})`;
                document.getElementById('zoom-status').innerText = Math.round(this.zoomLevel * 100) + "%";
            },

            async copySVG(btn) {
                const val = document.getElementById('svg-code').value; if(!val) return;
                try { await navigator.clipboard.writeText(val); this.effect(btn, "COPIED!", "check"); }
                catch(e) { document.getElementById('svg-code').select(); document.execCommand('copy'); this.effect(btn, "COPIED!", "check"); }
            },
            downloadSVG(btn) {
                const val = document.getElementById('svg-code').value; if(!val) return;
                this.effect(btn, "SAVED!", "arrow-down");
                const blob = new Blob([val], {type: "image/svg+xml"}); const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = "vector-forge.svg"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            },
            effect(btn, txt, icon) {
                const og = btn.innerHTML; btn.classList.add('btn-success-anim');
                btn.innerHTML = `<i data-lucide="${icon}" class="w-3 h-3 mr-1"></i> ${txt}`; lucide.createIcons();
                if(navigator.vibrate) navigator.vibrate(50);
                setTimeout(() => { btn.classList.remove('btn-success-anim'); btn.innerHTML = og; lucide.createIcons(); }, 1500);
            }
        };

        window.AppCore = AppCore;
        window.onload = () => AppCore.init();
    </script>
</body>
</html>
