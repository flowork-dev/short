<div class="flex flex-col md:flex-row h-full overflow-hidden">
    <div class="w-full md:w-80 border-b md:border-b-0 md:border-r border-[#3a3962] bg-[#12131c] p-4 md:p-6 flex flex-col gap-4 overflow-y-auto shrink-0 max-h-[40vh] md:max-h-full">

        <div>
            <label class="text-[10px] md:text-xs font-bold text-[#54d7f6] tracking-widest mb-2 block">SOURCE IMAGE</label>
            <div class="border border-dashed border-[#3a3962] rounded-lg p-4 text-center hover:border-[#54d7f6] transition cursor-pointer relative group bg-[#0a0a0a]" id="drop-zone">
                <input type="file" id="file-input" class="absolute inset-0 opacity-0 cursor-pointer z-10" accept="image/*">
                <div class="flex flex-col items-center gap-1">
                    <i data-lucide="upload-cloud" class="w-6 h-6 text-gray-500 group-hover:text-[#54d7f6] transition"></i>
                    <p class="text-[10px] text-gray-400">Tap / Drop Image</p>
                </div>
            </div>
        </div>

        <div class="flex-1">
            <label class="text-[10px] md:text-xs font-bold text-[#54d7f6] tracking-widest mb-2 block">TUNING</label>
            <div class="space-y-4">
                <div class="bg-[#1a1b26] p-3 rounded border border-[#3a3962]">
                    <div class="flex justify-between text-[10px] text-gray-400 mb-1"><span>Colors</span><span id="val-colors" class="text-[#54d7f6]">48</span></div>
                    <input type="range" id="opt-colors" min="2" max="64" value="48" step="2" class="w-full accent-[#54d7f6] h-1 bg-gray-700 rounded-lg appearance-none">
                </div>
                <div class="bg-[#1a1b26] p-3 rounded border border-[#3a3962]">
                    <div class="flex justify-between text-[10px] text-gray-400 mb-1"><span>Blur (Smooth)</span><span id="val-blur" class="text-[#54d7f6]">1</span></div>
                    <input type="range" id="opt-blur" min="0" max="4" value="1" step="1" class="w-full accent-[#54d7f6] h-1 bg-gray-700 rounded-lg appearance-none">
                </div>
                <div class="bg-[#1a1b26] p-3 rounded border border-[#3a3962]">
                    <div class="flex justify-between text-[10px] text-gray-400 mb-1"><span>Clean Noise</span><span id="val-speckle" class="text-[#54d7f6]">2</span></div>
                    <input type="range" id="opt-speckle" min="0" max="10" value="2" class="w-full accent-[#54d7f6] h-1 bg-gray-700 rounded-lg appearance-none">
                </div>
            </div>
        </div>

        <button id="btn-process" class="w-full py-3 bg-[#54d7f6] text-black font-bold text-sm rounded shadow-lg hover:scale-[1.02] transition active:scale-95 disabled:opacity-50 font-[Oswald] tracking-wider">
            CONVERT SVG
        </button>
    </div>

    <div class="flex-1 bg-[#050505] relative flex flex-col min-h-0">

        <div class="h-12 border-b border-[#3a3962] flex items-center justify-between px-3 bg-[#171925] shrink-0 z-20 shadow-md">
            <div class="flex items-center gap-2">
                <button onclick="AppCore.applyZoom(0.8)" class="p-1.5 rounded bg-[#2a2a40] hover:text-white text-gray-400 border border-[#3a3962]"><i data-lucide="minus" class="w-3 h-3"></i></button>
                <span class="text-[10px] font-mono w-8 text-center text-gray-500" id="zoom-status">100%</span>
                <button onclick="AppCore.applyZoom(1.2)" class="p-1.5 rounded bg-[#2a2a40] hover:text-white text-gray-400 border border-[#3a3962]"><i data-lucide="plus" class="w-3 h-3"></i></button>
                <button onclick="AppCore.resetView()" class="ml-1 p-1.5 rounded bg-[#2a2a40] hover:text-[#54d7f6] text-gray-400 border border-[#3a3962]" title="Reset View"><i data-lucide="maximize" class="w-3 h-3"></i></button>
            </div>

            <div class="flex bg-[#0a0a0a] p-0.5 rounded border border-[#3a3962]">
                <button id="btn-view-original" onclick="AppCore.togglePreview('original')" class="px-3 py-1 text-[10px] rounded hover:text-white text-gray-400 transition font-bold font-[Oswald]">ORIG</button>
                <button id="btn-view-vector" onclick="AppCore.togglePreview('vector')" class="px-3 py-1 text-[10px] rounded hover:text-white text-gray-400 transition font-bold font-[Oswald]">VECT</button>
            </div>

            <div class="flex gap-2">
                <button onclick="AppCore.downloadSVG(this)" class="p-1.5 md:px-3 md:py-1.5 rounded border border-[#3a3962] text-[#54d7f6] hover:bg-[#54d7f6] hover:text-black transition">
                    <i data-lucide="download" class="w-4 h-4 md:mr-1 inline"></i><span class="hidden md:inline text-[10px] font-bold">SAVE</span>
                </button>
                <button onclick="AppCore.copySVG(this)" class="p-1.5 md:px-3 md:py-1.5 rounded border border-[#3a3962] text-[#54d7f6] hover:bg-[#54d7f6] hover:text-black transition">
                    <i data-lucide="copy" class="w-4 h-4 md:mr-1 inline"></i><span class="hidden md:inline text-[10px] font-bold">COPY</span>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-hidden relative bg-[#050505] touch-none" id="preview-wrapper">
            <div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#3a3962 1px, transparent 1px); background-size: 20px 20px;"></div>

            <div class="w-full h-full flex items-center justify-center overflow-visible">
                <div id="preview-container" class="zoom-container transition-transform duration-75 relative">
                    <div class="text-gray-600 font-mono text-[10px] flex flex-col items-center gap-2 border border-[#3a3962] p-10 rounded-xl border-dashed">
                        <i data-lucide="image-plus" class="w-8 h-8 opacity-50"></i>
                        <span>NO IMAGE</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-4 left-4 z-10 text-[10px] text-gray-600 font-mono pointer-events-none" id="status-text">WAITING INPUT...</div>
        </div>

        <div class="h-1/3 md:h-40 border-t border-[#3a3962] bg-[#12131c] p-0 hidden flex-col absolute bottom-0 w-full z-30" id="code-panel">
            <div class="px-3 py-1 bg-[#0a0a0a] border-b border-[#3a3962] flex justify-between items-center">
                <span class="text-[10px] font-bold text-gray-500">SVG CODE</span>
                <button onclick="document.getElementById('code-panel').classList.add('hidden')" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-3 h-3"></i></button>
            </div>
            <textarea id="svg-code" class="w-full h-full bg-[#0a0a0a] text-green-400 font-mono text-[10px] p-4 border-none outline-none resize-none custom-scrollbar" readonly></textarea>
        </div>
    </div>
</div>
