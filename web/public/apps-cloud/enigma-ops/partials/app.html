<div class="w-full max-w-6xl mx-auto px-4 py-4 md:py-8 flex flex-col md:flex-row gap-4 md:gap-6 font-mono">

    <div class="w-full md:w-1/2 flex flex-col gap-4">
        <div class="border border-green-800 bg-[#050505] p-1 flex flex-col relative shadow-[0_0_30px_rgba(0,255,65,0.05)] h-[300px] md:h-full">
            <div class="absolute inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)50%,rgba(0,0,0,0.25)50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] z-10 bg-[length:100%_2px,3px_100%]"></div>

            <div class="bg-green-900/20 p-2 md:p-3 flex justify-between items-center border-b border-green-800">
                <span class="text-xs md:text-sm font-bold text-green-400 tracking-widest flex items-center gap-2">
                    <i data-lucide="arrow-right-circle" class="w-4 h-4"></i> INPUT
                </span>
                <div class="flex gap-3 relative z-20">
                    <button onclick="AppCore.clearAll()" class="text-xs text-green-600 hover:text-white font-bold transition p-1">[CLEAR]</button>
                    <button onclick="AppCore.pasteInput()" class="text-xs text-green-600 hover:text-white font-bold transition p-1">[PASTE]</button>
                </div>
            </div>
            <textarea id="inputCipher" class="w-full h-full bg-transparent text-green-400 p-4 font-mono outline-none resize-none text-sm md:text-base placeholder-green-900/50 relative z-20" placeholder="Paste cipher text here...&#10;Example: SGVsbG8gV29ybGQ=" oninput="AppCore.autoDetect()"></textarea>
        </div>
    </div>

    <div class="w-full md:w-1/2 flex flex-col gap-4 md:gap-6">

        <div class="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-3">
            <button onclick="AppCore.setMode('base64')" id="btn-base64" class="hacker-btn bg-green-500 text-black border border-green-500 py-3 font-bold text-xs md:text-sm tracking-widest hover:bg-green-400 transition">BASE64</button>
            <button onclick="AppCore.setMode('hex')" id="btn-hex" class="hacker-btn bg-transparent text-green-500 border border-green-500 py-3 font-bold text-xs md:text-sm tracking-widest hover:bg-green-500 hover:text-black transition">HEX</button>
            <button onclick="AppCore.setMode('binary')" id="btn-binary" class="hacker-btn bg-transparent text-green-500 border border-green-500 py-3 font-bold text-xs md:text-sm tracking-widest hover:bg-green-500 hover:text-black transition">BINARY</button>
            <button onclick="AppCore.setMode('morse')" id="btn-morse" class="hacker-btn bg-transparent text-green-500 border border-green-500 py-3 font-bold text-xs md:text-sm tracking-widest hover:bg-green-500 hover:text-black transition">MORSE</button>
            <button onclick="AppCore.setMode('rot13')" id="btn-rot13" class="hacker-btn bg-transparent text-green-500 border border-green-500 py-3 font-bold text-xs md:text-sm tracking-widest hover:bg-green-500 hover:text-black transition">ROT13</button>
            <button onclick="AppCore.setMode('url')" id="btn-url" class="hacker-btn bg-transparent text-green-500 border border-green-500 py-3 font-bold text-xs md:text-sm tracking-widest hover:bg-green-500 hover:text-black transition">URL</button>
        </div>

        <div id="rot-control" class="hidden border border-green-900 p-4 bg-black rounded">
            <div class="flex justify-between text-xs mb-2 text-green-400 font-bold">
                <span>SHIFT AMOUNT</span>
                <span id="rot-val" class="text-white">13</span>
            </div>
            <input type="range" min="1" max="25" value="13" class="w-full accent-green-500 h-4 bg-green-900/30 rounded-lg appearance-none cursor-pointer" oninput="AppCore.updateRot(this.value)">
        </div>

        <button onclick="AppCore.crackCode()" class="w-full py-4 md:py-5 text-lg md:text-xl font-bold bg-green-900/20 text-green-400 border border-green-500 hover:bg-green-500 hover:text-black transition-all flex justify-center items-center gap-3 shadow-[0_0_20px_rgba(0,255,65,0.2)] tracking-widest pixel-font active:scale-[0.98]">
            <i data-lucide="unlock" class="w-5 h-5"></i> <span class="md:hidden">DECRYPT</span> <span class="hidden md:inline">DECRYPT DATA</span>
        </button>

        <div class="border border-green-500 bg-[#050505] flex-1 flex flex-col relative shadow-[0_0_20px_rgba(0,255,65,0.1)] min-h-[250px]">
            <div class="bg-green-500 text-black p-2 md:p-3 flex justify-between items-center font-bold border-b border-green-600">
                <span class="text-xs tracking-widest flex items-center gap-2">
                    <i data-lucide="terminal-square" class="w-4 h-4"></i> OUTPUT
                </span>
                <button onclick="AppCore.copyOutput()" class="text-xs hover:underline uppercase p-1">[COPY]</button>
            </div>
            <div class="p-4 md:p-6 relative flex-1 overflow-hidden">
                <pre id="outputPlain" class="font-mono text-white text-sm md:text-base break-all whitespace-pre-wrap h-full overflow-y-auto max-h-[300px]"></pre>
            </div>
        </div>

        <div class="flex justify-between text-[10px] md:text-xs text-gray-500 font-mono border-t border-green-900/30 pt-2 pb-6 md:pb-0">
            <span id="status-detection" class="uppercase truncate">AUTO-DETECT: IDLE</span>
            <span>V.3.4 KERNEL</span>
        </div>
    </div>

</div>
