<div class="w-full h-full flex flex-col items-center justify-center p-6 animate-fade-in bg-[#171925]">

    <div class="w-full max-w-xl bg-[#1a1a24]/60 border border-gray-800 p-8 rounded-2xl relative overflow-hidden group shadow-2xl">

        <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/10 blur-3xl rounded-full pointer-events-none group-hover:bg-red-600/20 transition-all"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-600/10 blur-3xl rounded-full pointer-events-none"></div>

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#1f1115] border border-red-500 rounded-xl mx-auto flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(255,42,109,0.2)]">
                <i data-lucide="file-warning" class="w-8 h-8 text-red-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-white brand-font tracking-wider">FILE CORRUPTER</h2>
            <p class="text-xs text-gray-400 code-font mt-2">TARGET: HEADER BYTES & MAGIC NUMBERS</p>
        </div>

        <div id="drop-zone" class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center cursor-pointer hover:border-red-500 hover:bg-red-900/10 transition-all relative group/zone">
            <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="AppCore.handleFileSelect(this)">

            <div id="drop-content" class="group-hover/zone:scale-105 transition-transform">
                <i data-lucide="upload-cloud" class="w-10 h-10 text-gray-500 mx-auto mb-4 group-hover/zone:text-red-400"></i>
                <p class="text-sm text-gray-300 font-bold mb-1">DROP FILE HERE</p>
                <p class="text-xs text-gray-500">Word, Excel, PDF, ZIP, Image (Max 100MB)</p>
            </div>

            <div id="file-preview" class="hidden">
                <i data-lucide="file-code" class="w-10 h-10 text-red-400 mx-auto mb-4 animate-bounce"></i>
                <p id="fileName" class="text-sm text-white font-bold mb-1 truncate">filename.docx</p>
                <p id="fileSize" class="text-xs text-gray-400 mb-4">2.5 MB</p>
                <p class="text-[10px] text-red-500 bg-red-900/20 py-1 px-2 rounded inline-block font-mono tracking-widest">READY TO SABOTAGE</p>
            </div>
        </div>

        <div class="mt-8 space-y-4">
            <div class="flex justify-between text-[10px] text-gray-500 font-mono px-1">
                <span>CORRUPTION LEVEL:</span>
                <span class="text-red-500 font-bold">FATAL (HEADER DESTROYED)</span>
            </div>
            <div class="w-full h-1 bg-gray-800 rounded overflow-hidden">
                <div id="progressBar" class="h-full bg-red-500 w-0 transition-all duration-1000"></div>
            </div>

            <button id="btn-corrupt" onclick="AppCore.corruptFile()" class="w-full bg-red-900/20 border border-red-500 hover:bg-red-500 hover:text-black text-red-500 py-4 rounded font-bold text-sm tracking-widest flex justify-center items-center gap-2 transition-all shadow-[0_0_15px_rgba(255,42,109,0.2)] disabled:opacity-50 disabled:cursor-not-allowed brand-font" disabled>
                EXECUTE CORRUPTION
            </button>

            <p id="status-log" class="text-center text-[10px] text-gray-500 font-mono h-4"></p>
        </div>
    </div>

    <div class="mt-8 text-center opacity-50 hover:opacity-100 transition-opacity">
        <p class="text-[10px] text-gray-600 font-mono">
            SECURE: PROCESS HAPPENS LOCALLY IN YOUR BROWSER.<br>
            WE DO NOT SEE YOUR FILES.
        </p>
    </div>

</div>
