<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FLOWORK // SIGNAL PROCESSOR</title>

    <script src="../../assets/js/auto-tracker.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/libs/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(15, 16, 20, 0.7);
            --border-col: rgba(255, 255, 255, 0.1);
            --accent: #54d7f6;
            --gold: #ffd700;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0f0ff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; /* Body gak scroll, yang scroll content-wrapper */
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* --- CANVA STYLE BACKGROUND (BLUE & GOLD) --- */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: #050505;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite alternate;
        }
        .blob-blue {
            top: -10%; left: -10%; width: 70vw; height: 70vw;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
        }
        .blob-gold {
            bottom: -10%; right: -10%; width: 80vw; height: 80vw;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 40px); }
        }

        /* UI UTILS */
        .font-hud { font-family: 'Rajdhani', sans-serif; }
        .hidden-view { display: none !important; }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-col);
        }

        /* SCROLLBAR & SCROLL BEHAVIOR */
        .scroll-viewport {
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        /* Hide scrollbar for clean look but allow scroll */
        .scroll-viewport::-webkit-scrollbar { width: 4px; }
        .scroll-viewport::-webkit-scrollbar-track { background: transparent; }
        .scroll-viewport::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* ANIMATIONS */
        .animate-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* PREVIEW FIX FOR MOBILE */
        .preview-sticky {
            position: relative;
            z-index: 20;
        }
        @media (min-width: 768px) {
            .preview-sticky {
                position: sticky;
                top: 0;
                height: 100vh; /* Full height on desktop */
                overflow: hidden;
            }
        }
    </style>
</head>
<body class="relative">

    <div class="ambient-bg">
        <div class="blob blob-blue"></div>
        <div class="blob blob-gold"></div>
    </div>

    <nav class="shrink-0 h-16 border-b border-white/10 glass-panel flex items-center px-6 z-50 justify-between relative">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="window.location.reload()">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-900 to-black border border-blue-500/30 flex items-center justify-center group-hover:border-cyan-400 transition-colors shadow-lg shadow-cyan-900/20">
                <i data-lucide="zap" class="text-cyan-400 w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl font-hud tracking-[0.15em] text-white leading-none">FLOWORK</h1>
                <span class="text-cyan-500/60 text-[10px] tracking-widest font-mono">SIGNAL PROCESSOR</span>
            </div>
        </div>

        <div class="flex items-center gap-2 border border-green-500/20 bg-green-900/10 px-3 py-1 rounded-full">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] text-green-400 font-bold tracking-wider">V4.0</span>
        </div>
    </nav>

    <div class="flex border-b border-white/10 bg-black/40 shrink-0 backdrop-blur-sm z-40">
        <button id="tab-encode" onclick="window.switchTab('encode')" class="flex-1 px-4 py-4 text-xs font-bold font-hud tracking-[0.2em] bg-white/5 text-cyan-400 border-b-2 border-cyan-400 transition-all hover:bg-white/10">
            <i data-lucide="lock" class="inline w-3 h-3 mr-2"></i> ENCODER
        </button>
        <button id="tab-decode" onclick="window.switchTab('decode')" class="flex-1 px-4 py-4 text-xs font-bold font-hud tracking-[0.2em] text-gray-400 border-b-2 border-transparent hover:text-white hover:bg-white/5 transition-all">
            <i data-lucide="unlock" class="inline w-3 h-3 mr-2"></i> DECODER
        </button>
    </div>

    <main id="main-viewport" class="flex-1 scroll-viewport relative w-full">

        <div id="section-encode" class="min-h-full animate-enter">
            <div class="flex flex-col md:flex-row min-h-full">

                <div class="flex-1 p-6 space-y-6 border-r border-white/5 pb-32 md:pb-10">

                    <div class="glass-panel rounded-xl p-4 relative shadow-lg group focus-within:border-cyan-500/50 transition-colors">
                        <label class="text-[10px] text-cyan-400 font-bold tracking-widest block mb-2 opacity-80">PAYLOAD DATA</label>
                        <textarea id="secret-msg" class="w-full bg-black/40 border border-white/10 rounded p-4 text-white text-sm font-mono h-32 resize-none focus:border-cyan-500/50 focus:outline-none placeholder-gray-600 transition-all" placeholder="Enter secret message here..."></textarea>
                    </div>

                    <div class="glass-panel rounded-xl p-4 relative group hover:border-red-500/30 transition-colors">
                        <label class="text-[10px] text-red-400 font-bold tracking-widest block mb-2 flex items-center gap-2"><i data-lucide="key" class="w-3 h-3"></i> ENCRYPTION KEY (AES-256)</label>
                        <input type="password" id="encrypt-pass" class="w-full bg-black/40 text-red-300 font-mono text-sm border border-white/10 rounded p-3 outline-none focus:border-red-500/50 placeholder-gray-700 transition-all" placeholder="Password (Optional)...">
                    </div>

                    <div class="relative group cursor-pointer border border-dashed border-white/20 hover:border-cyan-400/50 bg-white/5 hover:bg-cyan-900/10 p-6 text-center rounded-xl transition-all">
                        <input type="file" id="carrier-video" accept="video/*,audio/*" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="window.updateFileName(this)">
                        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center mx-auto mb-3 group-hover:scale-110 transition-transform">
                            <i data-lucide="upload" class="w-5 h-5 text-gray-400 group-hover:text-cyan-400"></i>
                        </div>
                        <span id="file-name-display" class="text-[10px] text-gray-400 tracking-widest font-bold group-hover:text-white">UPLOAD CARRIER FILE (OPTIONAL)</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="glass-panel rounded p-1">
                            <select id="output-format" class="w-full bg-transparent text-white text-xs p-2 outline-none uppercase font-mono cursor-pointer"><option value="mp4" class="bg-black">MP4 Video</option><option value="wav" class="bg-black">WAV Audio</option></select>
                        </div>
                        <div class="glass-panel rounded p-1">
                            <select id="aspect-ratio" class="w-full bg-transparent text-white text-xs p-2 outline-none uppercase font-mono cursor-pointer"><option value="9:16" class="bg-black">TikTok (9:16)</option><option value="16:9" class="bg-black">YouTube (16:9)</option></select>
                        </div>
                    </div>

                    <button onclick="window.AudioCore.processEncoding()" class="w-full py-4 rounded-xl bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-black font-hud text-lg tracking-[0.2em] transition-all shadow-lg shadow-cyan-900/40 active:scale-[0.98]">
                        GENERATE SIGNAL
                    </button>
                </div>

                <div class="md:w-[400px] bg-black/20 border-l border-white/5 preview-sticky flex items-center justify-center p-6 backdrop-blur-sm min-h-[300px] md:min-h-auto border-t md:border-t-0 border-white/5">
                    <div id="preview-container" class="w-full flex flex-col items-center justify-center border border-white/5 rounded-xl bg-black/40 p-4 min-h-[200px]">
                        <div class="text-center opacity-40">
                            <i data-lucide="activity" class="w-12 h-12 text-cyan-400 mx-auto mb-4 animate-pulse"></i>
                            <p class="text-[10px] font-mono text-cyan-500 tracking-widest">AWAITING INPUT SIGNAL...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-decode" class="hidden-view min-h-full p-6 animate-enter">
            <div class="max-w-2xl mx-auto space-y-6 mt-4 pb-40"> <div class="glass-panel border-white/10 p-5 relative group hover:border-yellow-500/30 transition-colors rounded-xl shadow-lg">
                    <div class="absolute -top-2.5 left-4 bg-yellow-600 text-black px-2 py-0.5 text-[9px] font-bold tracking-widest z-10 rounded">BRIDGE EXTRACTOR</div>
                    <div class="flex gap-3 mt-2">
                        <input type="text" id="social-link-input" class="flex-1 bg-black/50 border border-white/10 rounded-lg text-yellow-100 font-mono text-xs px-4 py-3 focus:border-yellow-500/50 outline-none placeholder-gray-600" placeholder="Paste TikTok / YouTube Shorts Link...">
                        <button onclick="window.AudioCore.processLinkDecoding()" class="bg-yellow-600 hover:bg-yellow-500 text-black rounded-lg w-12 flex items-center justify-center transition-colors shadow-lg shadow-yellow-900/20 active:scale-95">
                            <i data-lucide="globe" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="glass-panel border-white/10 p-4 rounded-xl relative group hover:border-red-500/30 transition-colors">
                    <label class="text-[10px] text-gray-400 font-bold tracking-widest block mb-2"><i data-lucide="lock" class="inline w-3 h-3 mr-1"></i> DECRYPTION KEY</label>
                    <input type="password" id="decrypt-pass" class="w-full bg-black/50 text-red-300 font-mono text-sm border border-white/10 rounded p-3 outline-none focus:border-red-500/50 placeholder-gray-700" placeholder="Enter password if encrypted...">
                </div>

                <div class="border-2 border-dashed border-white/10 hover:border-green-500/50 bg-white/5 rounded-xl p-10 text-center relative group transition-all">
                    <input type="file" id="decode-input" accept="video/*,audio/*" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-20" onchange="window.AudioCore.processDecoding(this)">
                    <div class="w-16 h-16 bg-green-900/20 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform border border-green-500/20">
                        <i data-lucide="scan-line" class="w-8 h-8 text-green-500"></i>
                    </div>
                    <h3 class="text-lg font-hud font-bold text-white mb-1">MANUAL FILE SCAN</h3>
                    <p class="text-[10px] text-gray-500 font-mono tracking-widest">UPLOAD DOWNLOADED MEDIA</p>
                </div>

                <div id="section-decode-result" class="empty:hidden"></div>

            </div>
        </div>

        <footer id="global-footer" class="shrink-0 border-t border-white/5 bg-black/40 backdrop-blur text-center w-full py-4 mt-auto relative z-10">
            </footer>

    </main>

    <div id="toast-container" class="fixed top-20 right-6 left-6 md:left-auto z-[150] flex flex-col gap-2 pointer-events-none"></div>

    <div id="loading-overlay" class="fixed inset-0 bg-[#050505]/95 backdrop-blur-xl flex flex-col items-center justify-center z-[200] hidden">
        <div class="w-24 h-24 mb-6 relative">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" class="animate-pulse">
              <defs>
                <linearGradient id="live_grad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2d2f45"><animate attributeName="stop-color" values="#2d2f45;#1a1a2e;#2d2f45" dur="4s" repeatCount="indefinite"/></stop>
                  <stop offset="50%" stop-color="#706bf3"><animate attributeName="stop-color" values="#706bf3;#9b5de5;#706bf3" dur="4s" repeatCount="indefinite"/></stop>
                  <stop offset="100%" stop-color="#54d7f6"><animate attributeName="stop-color" values="#54d7f6;#00f2ff;#54d7f6" dur="4s" repeatCount="indefinite"/></stop>
                </linearGradient>
              </defs>
              <g class="body-breathe">
                <path d="M100 80 L 220 80 L 220 200 L 160 200 L 160 432 L 100 432 Z" fill="url(#live_grad)" stroke="#3a3962" stroke-width="4"/>
                <path d="M260 80 L 412 80 L 412 180 L 260 180 Z" fill="#54d7f6" opacity="0.9"/>
                <path d="M260 220 L 360 220 L 360 320 L 260 320 Z" fill="#706bf3" opacity="0.9"/>
              </g>
            </svg>
        </div>
        <h3 class="text-xl font-bold text-white font-hud tracking-[0.3em] animate-pulse">PROCESSING</h3>
        <p class="text-[10px] text-cyan-400 font-mono mt-3 uppercase tracking-widest bg-cyan-900/20 border border-cyan-500/20 px-4 py-1 rounded-full" id="loading-text">INITIALIZING ENGINE...</p>
    </div>

    <div id="modal-unlock" class="absolute inset-0 z-[160] bg-black/95 backdrop-blur-md hidden flex-col items-center justify-center animate-enter p-6">
        <div class="glass-panel border-red-500/50 rounded-2xl p-8 max-w-sm w-full shadow-2xl shadow-red-900/40">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/50 animate-pulse">
                    <i data-lucide="lock" class="w-6 h-6 text-red-500"></i>
                </div>
                <h3 class="text-lg font-bold text-white font-hud tracking-widest">LOCKED DATA</h3>
                <p class="text-xs text-red-400 mt-2 font-mono">Password required to unlock content.</p>
            </div>

            <div class="space-y-4">
                <input type="password" id="modal-pass-input" class="w-full bg-black/60 text-white text-center font-bold text-lg border border-red-900/50 rounded-lg p-4 outline-none focus:border-red-500 transition-colors placeholder-gray-700" placeholder="ENTER PASSWORD">
                <button onclick="window.AudioCore.retryDecryption()" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-black tracking-[0.2em] rounded-lg transition-all shadow-lg active:scale-95">
                    UNLOCK
                </button>
                <button onclick="document.getElementById('modal-unlock').classList.add('hidden')" class="w-full py-2 text-xs text-gray-500 hover:text-white tracking-widest uppercase">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <div id="svg-source" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" id="source-svg-el">
          <defs><linearGradient id="static_grad" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2d2f45"/><stop offset="50%" stop-color="#706bf3"/><stop offset="100%" stop-color="#54d7f6"/></linearGradient></defs>
          <path d="M100 80 L 220 80 L 220 200 L 160 200 L 160 432 L 100 432 Z" fill="url(#static_grad)" stroke="#3a3962" stroke-width="4"/>
          <path d="M260 80 L 412 80 L 412 180 L 260 180 Z" fill="#54d7f6"/>
          <path d="M260 220 L 360 220 L 360 320 L 260 320 Z" fill="#706bf3"/>
          <path d="M220 130 L 260 130" stroke="#ffd700" stroke-width="8" stroke-linecap="round"/>
          <path d="M220 270 L 260 270" stroke="#ffd700" stroke-width="8" stroke-linecap="round"/>
        </svg>
    </div>

    <script src="js/audio-engine.js"></script>

    <script>
        // --- UI & TAB SWITCHING LOGIC ---
        window.switchTab = function(tab) {
            const tabs = ['encode', 'decode'];
            tabs.forEach(t => {
                const section = document.getElementById(`section-${t}`);
                const btn = document.getElementById(`tab-${t}`);
                if(section && btn) {
                    if(t === tab) {
                        section.classList.remove('hidden-view');
                        // Active State
                        btn.classList.add('bg-white/5', 'text-cyan-400', 'border-cyan-400');
                        btn.classList.remove('text-gray-400', 'border-transparent');
                    } else {
                        section.classList.add('hidden-view');
                        // Inactive State
                        btn.classList.remove('bg-white/5', 'text-cyan-400', 'border-cyan-400');
                        btn.classList.add('text-gray-400', 'border-transparent');
                    }
                }
            });
        };

        window.updateFileName = function(input) {
            const label = document.getElementById('file-name-display');
            if(input.files && input.files[0]) {
                label.innerText = input.files[0].name;
                label.classList.add('text-cyan-400');
            }
        };

        const SysUI = {
            toast(msg, type = 'info') {
                const container = document.getElementById('toast-container');
                const el = document.createElement('div');
                const color = type === 'error'
                    ? 'border-red-500 text-red-100 bg-red-900/80'
                    : 'border-cyan-500 text-cyan-100 bg-cyan-900/80';

                el.className = `pointer-events-auto backdrop-blur-md border-l-4 ${color} rounded-r px-4 py-3 shadow-2xl font-bold text-xs flex items-center gap-3 animate-enter max-w-sm ml-auto`;

                el.innerHTML = `<span>${msg}</span>`;

                container.appendChild(el);
                setTimeout(() => {
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300);
                }, 4000);
            }
        };

        // EXPOSE GLOBAL
        window.SysUI = SysUI;

        // INIT APP
        document.addEventListener('DOMContentLoaded', () => {
            // Init Icons
            if(window.lucide) lucide.createIcons();

            // Init Audio Core (Safe Check)
            if(window.AudioCore && window.AudioCore.initCtx) {
                window.AudioCore.initCtx();
            }

            // Load Footer (Logic from Request)
            loadFooter();
        });

        // --- FOOTER LOGIC ---
        async function loadFooter() {
            try {
                const response = await fetch('/assets/lander/footer.html');
                if (!response.ok) throw new Error('Footer not found');

                let html = await response.text();

                // Auto Year Update
                const realYear = new Date().getFullYear();
                html = html.replace('{YEAR}', realYear);

                document.getElementById('global-footer').innerHTML = html;

                // Re-init icons
                if(window.lucide) window.lucide.createIcons();

            } catch (e) {
                console.warn("Footer load fallback:", e);
                const year = new Date().getFullYear();
                document.getElementById('global-footer').innerHTML =
                    `<div class="p-6 text-center text-gray-500 font-mono text-[10px] tracking-widest">
                        © ${year} FLOWORK SYSTEM [LOCAL MODE]
                    </div>`;
            }
        }
    </script>
</body>
</html>
